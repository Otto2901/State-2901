    if(r.error){ toast('Error: '+r.error.message); return; }
    TRANSFER_PERIOD=r.data;
    toast('✅ Period settings saved!'); render();
  });

  document.getElementById('trNewPeriod').addEventListener('click',async function(){
    if(!confirm('End current period and start a new one? Old invites will be archived.')) return;
    var typed=prompt('Type NEW to confirm:');
    if(typed!=='NEW'){ toast('Cancelled'); return; }
    // End current
    await sb.from('transfer_periods').update({is_active:false,ended_at:new Date().toISOString()}).eq('id',p.id);
    // Create new
    var r=await sb.from('transfer_periods').insert([{
      name:'Transfer Period',normal_limit:p.normal_limit,
      special_limit:p.special_limit,power_cap:p.power_cap,
      is_active:true,created_by:SESSION.name
    }]).select().single();
    if(r.error){ toast('Error: '+r.error.message); return; }
    TRANSFER_PERIOD=r.data;
    TRANSFER_INVITES=[];
    toast('✅ New period started!'); render();
  });

    var pl=document.getElementById('trMgrPlayer').value;
    if(!pl){ toast('Select a player'); return; }
    var existsTr=ALLIANCE_REPS.find(function(x){ return x.player_name===pl&&x.alliance==='TRANSFER'; });

    var r=await sb.from('alliance_reps').insert([{player_name:pl,alliance:'TRANSFER',granted_by:SESSION.name}]).select().single();
    if(r.error){ toast('Error: '+r.error.message); return; }
    var idx=ALLIANCE_REPS.findIndex(function(x){ return x.player_name===pl&&x.alliance==='TRANSFER'; });

    toast('✅ Manager added: '+pl); render();
  });

  tc.querySelectorAll('.tr-rmv-mgr').forEach(function(btn){
    btn.addEventListener('click',async function(){
      if(!confirm('Remove manager: '+btn.dataset.player+'?')) return;
      await sb.from('alliance_reps').delete().eq('player_name',btn.dataset.player).eq('alliance','TRANSFER');
      ALLIANCE_REPS=ALLIANCE_REPS.filter(function(r){ return !(r.player_name===btn.dataset.player&&r.alliance==='TRANSFER'); });
      toast('Removed'); render();
    });
  });
}

function renderRotHistory(rc){
  // Get all unique weeks sorted desc
  var weeks=[...new Set(ROT_SELS.map(function(s){ return s.week_start; }))].sort(function(a,b){ return b>a?1:-1; });

  if(weeks.length===0){
    rc.innerHTML='<div class="empty"><div class="empty-icon">📅</div><p>No history yet.<br>Selections will appear here after each week.</p></div>';
    return;
  }

  // Clamp index
  if(ROT_HIST_IDX>=weeks.length) ROT_HIST_IDX=weeks.length-1;
  if(ROT_HIST_IDX<0) ROT_HIST_IDX=0;

  var weekStart=weeks[ROT_HIST_IDX];
  var weekSels=ROT_SELS.filter(function(s){ return s.week_start===weekStart; });
  var weekDate=new Date(weekStart).toLocaleDateString('en-GB',{day:'2-digit',month:'short',year:'numeric'});

  // Build maps
  var takenSH={}, takenFT={};
  weekSels.forEach(function(s){
    if(s.stronghold) takenSH[s.stronghold]=s.alliance;
    if(s.fort) takenFT[s.fort]=s.alliance;
  });

  // Nav buttons
  var navHtml=
    '<div style="display:flex;align-items:center;justify-content:space-between;background:rgba(26,18,10,.6);border:1px solid rgba(196,155,92,.14);border-radius:12px;padding:10px 14px;margin-bottom:12px;">'+
      '<button class="rot-act-btn" id="histPrev" '+(ROT_HIST_IDX<weeks.length-1?'':'disabled')+' style="padding:6px 12px;">← Older</button>'+
      '<div style="text-align:center;">'+
        '<div style="font-size:13px;font-weight:800;color:#f2e6d0;">Week of '+weekDate+'</div>'+
        '<div style="font-size:11px;color:var(--t2);">'+(ROT_HIST_IDX===0?'Most Recent':'Week '+(ROT_HIST_IDX+1)+' ago')+'</div>'+
      '</div>'+
      '<button class="rot-act-btn" id="histNext" '+(ROT_HIST_IDX>0?'':'disabled')+' style="padding:6px 12px;">Newer →</button>'+
    '</div>';

  // Strongholds
  var shHtml='<div style="background:rgba(26,18,10,.6);border:1px solid rgba(196,155,92,.14);border-radius:12px;padding:14px;margin-bottom:12px;">'+
    '<div style="font-size:12px;font-weight:800;color:#ffd60a;margin-bottom:10px;text-transform:uppercase;letter-spacing:.5px;">🏰 Strongholds</div>'+
    '<div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;">';
  for(var i=1;i<=4;i++){
    var al=takenSH[i];
    var color=al?(ALLIANCE_COLORS[al]||'var(--ac)'):'#6b5a42';
    shHtml+='<div style="background:rgba(18,13,8,.52);border:1px solid rgba(196,155,92,.14);border-radius:10px;padding:10px;text-align:center;">'+
      '<div style="font-size:11px;color:var(--t2);margin-bottom:4px;">SH '+i+'</div>'+
      '<div style="font-size:14px;font-weight:800;color:'+color+';">'+(al||'—')+'</div>'+
    '</div>';
  }
  shHtml+='</div></div>';

  // Forts
  var ftHtml='<div style="background:rgba(26,18,10,.6);border:1px solid rgba(196,155,92,.14);border-radius:12px;padding:14px;margin-bottom:12px;">'+
    '<div style="font-size:12px;font-weight:800;color:var(--ac);margin-bottom:10px;text-transform:uppercase;letter-spacing:.5px;">🏯 Forts</div>'+
    '<div style="display:grid;grid-template-columns:repeat(3,1fr);gap:6px;">';
  for(var j=1;j<=12;j++){
    var fal=takenFT[j];
    var fcolor=fal?(ALLIANCE_COLORS[fal]||'var(--ac)'):'#52c759';
    var fbg=fal?'rgba(18,13,8,.52)':'rgba(52,199,89,.06)';
    var fborder=fal?'rgba(196,155,92,.14)':'rgba(52,199,89,.2)';
    ftHtml+='<div style="background:'+fbg+';border:1px solid '+fborder+';border-radius:8px;padding:8px;text-align:center;">'+
      '<div style="font-size:10px;color:var(--t2);margin-bottom:3px;">F'+j+'</div>'+
      '<div style="font-size:12px;font-weight:800;color:'+fcolor+'">'+(fal||'FREE')+'</div>'+
    '</div>';
  }
  ftHtml+='</div></div>';

  // Alliance breakdown
  var allRows=weekSels.map(function(s){
    var color=ALLIANCE_COLORS[s.alliance]||'var(--ac)';
    return '<div style="display:flex;justify-content:space-between;align-items:center;padding:7px 0;border-bottom:1px solid rgba(100,160,220,.06);">'+
      '<span style="font-size:13px;font-weight:800;color:'+color+';">'+s.alliance+'</span>'+
      '<span style="font-size:12px;color:var(--t2);">'+
        (s.stronghold?'🏰 SH'+s.stronghold+' · ':'')+
        (s.fort?'🏯 F'+s.fort:'')+
      '</span>'+
    '</div>';
  }).join('');

  var breakdownHtml=weekSels.length?
    '<div style="background:rgba(26,18,10,.6);border:1px solid rgba(196,155,92,.14);border-radius:12px;padding:14px;margin-bottom:12px;">'+
      '<div style="font-size:12px;font-weight:800;color:var(--ac);margin-bottom:10px;text-transform:uppercase;letter-spacing:.5px;">📋 Selections ('+weekSels.length+')</div>'+
      allRows+
    '</div>':'';

  rc.innerHTML=navHtml+shHtml+ftHtml+breakdownHtml;

  document.getElementById('histPrev').addEventListener('click',function(){ ROT_HIST_IDX++; render(); });
  document.getElementById('histNext').addEventListener('click',function(){ ROT_HIST_IDX--; render(); });
}

  app.innerHTML=

            '</div>'+
          '</div>'+
        '</div>';
      }).join('')+
    '</div>':'';

  // ID change requests
  var idReqHtml=ID_REQUESTS.filter(function(r){ return r.status==='pending'; }).length?
    '<div style="background:rgba(255,149,0,.06);border:2px solid rgba(255,149,0,.3);border-radius:12px;padding:14px;margin-bottom:12px;">'+
      '<div style="font-size:12px;font-weight:800;color:#ff9500;margin-bottom:10px;text-transform:uppercase;letter-spacing:.5px;">🔄 ID Change Requests ('+ID_REQUESTS.filter(function(r){ return r.status==='pending'; }).length+')</div>'+
      ID_REQUESTS.filter(function(r){ return r.status==='pending'; }).map(function(req){
        return '<div style="background:rgba(26,18,10,.6);border-radius:10px;padding:10px;margin-bottom:8px;">'+
          '<div style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px;">'+
            '<div>'+
              '<div style="font-size:13px;font-weight:800;color:#f2e6d0;">'+req.player_name+'</div>'+
              '<div style="font-size:11px;color:var(--t2);">'+req.old_id+' → <strong style="color:#ffd60a;">'+req.new_id+'</strong></div>'+
            '</div>'+
            '<div style="display:flex;gap:6px;">'+
              '<button class="btn btn-g btn-sm approve-id-req" data-id="'+req.id+'" data-player="'+req.player_name+'" data-newid="'+req.new_id+'" style="padding:5px 12px;font-size:11px;">✅ Approve</button>'+
              '<button class="btn btn-d btn-sm reject-id-req" data-id="'+req.id+'" style="padding:5px 12px;font-size:11px;background:rgba(255,69,58,.15);border-color:rgba(255,69,58,.3);color:#ff453a;">❌ Reject</button>'+
            '</div>'+
          '</div>'+
        '</div>';
      }).join('')+
    '</div>':'';

  // Group approved players by alliance
  var groups = {};
  approved.forEach(function(p){
    var key = p.alliance || '__none__';
    if(!groups[key]) groups[key] = [];
    groups[key].push(p);
  });
  var sortedGroups = Object.keys(groups).sort(function(a,b){
    if(a==='__none__') return 1;
    if(b==='__none__') return -1;
    return a.localeCompare(b);
  });

  function playerRowHtml(p){
    var role=getRole(p.name);
    var roleTag=role?'<span class="role-badge '+(role==="super_admin"?"role-super":role==="svs_admin"?"role-svs":role==="library_admin"?"role-svs":"role-mod")+'" style="font-size:9px;">'+role.replace(/_/g," ")+'</span>':'';
    var playerReps=ALLIANCE_REPS.filter(function(r){ return r.player_name===p.name; });
    var repTags=playerReps.map(function(r){
      if(r.alliance==='TRANSFER') return '<span style="font-size:9px;background:rgba(143,122,168,.12);color:#b494c4;border:1px solid rgba(143,122,168,.35);border-radius:5px;padding:1px 5px;">✈️ Transfer Rep</span>';
      return '<span style="font-size:9px;background:rgba(201,151,75,.1);color:#d9ab5c;border:1px solid rgba(201,151,75,.28);border-radius:5px;padding:1px 5px;">Rep: '+r.alliance+'</span>';
    }).join(' ');
    var dupId=p.player_id&&approved.filter(function(x){ return x.player_id===p.player_id; }).length>1;
    return '<div style="'+(dupId?'background:rgba(181,85,74,.06);':'')+';border-radius:8px;padding:9px 6px;border-bottom:1px solid rgba(196,155,92,.06);">'+
      '<div style="display:flex;align-items:center;gap:8px;">'+
        '<div style="flex:1;min-width:0;">'+
          '<div style="font-size:13px;font-weight:700;color:#f2e6d0;display:flex;align-items:center;gap:4px;flex-wrap:wrap;">'+
            p.name+' '+roleTag+' '+repTags+
            (dupId?'<span style="font-size:9px;background:rgba(181,85,74,.18);color:#b5554a;border:1px solid rgba(181,85,74,.35);border-radius:5px;padding:1px 5px;">⚠️ Dup ID</span>':'')+
          '</div>'+
          '<div style="font-size:11px;color:rgba(230,213,180,.45);margin-top:3px;">'+
            (p.player_id?'<span style="font-family:monospace;color:#e3bc6a;">'+p.player_id+'</span>':'<span style="color:#b5554a;">No ID</span>')+
          '</div>'+
        '</div>'+
        '<div style="display:flex;gap:4px;flex-shrink:0;">'+
          '<button class="btn btn-d btn-sm reset-pin" data-player="'+p.name+'" title="Reset PIN" style="padding:4px 8px;font-size:11px;">🔑</button>'+
          '<button class="btn btn-d btn-sm del-account" data-player="'+p.name+'" title="Delete" style="padding:4px 8px;font-size:11px;">🗑</button>'+
        '</div>'+
      '</div>'+
    '</div>';
  }

  var approvedHtml = sortedGroups.map(function(key){
    var list = groups[key];
    var label = key==='__none__' ? '🌐 Others ('+list.length+')' : '🏳️ '+key+' ('+list.length+')';
    return '<div class="card" style="margin-bottom:10px;">'+
      '<div style="font-size:11px;font-weight:700;color:rgba(230,213,180,.5);text-transform:uppercase;letter-spacing:1px;margin-bottom:10px;">'+label+'</div>'+
      list.map(playerRowHtml).join('')+
    '</div>';
  }).join('');

  ac.innerHTML=idReqHtml+pendingHtml+
    '<div style="font-size:12px;font-weight:700;color:rgba(230,213,180,.65);margin-bottom:8px;">✅ Approved Players ('+approved.length+')</div>'+
    '<div style="position:relative;margin-bottom:12px;">'+
      '<input class="inp" id="playerSearch" placeholder="🔍  Search by name, ID or alliance..." style="padding-left:14px;" autocomplete="off">'+
    '</div>'+
    '<div id="playerGroupsWrap">'+approvedHtml+'</div>';

  // Live search filter
  var searchInp=ac.querySelector('#playerSearch');
  if(searchInp) searchInp.addEventListener('input',function(){
    var q=searchInp.value.trim().toLowerCase();
    ac.querySelectorAll('#playerGroupsWrap .card').forEach(function(card){
      var rows=card.querySelectorAll('[data-player]');
      // also check card title text
      var anyMatch=false;
      // Search within player rows
      card.querySelectorAll('div[style*="border-bottom"]').forEach(function(row){
        var txt=row.textContent.toLowerCase();
        var match=!q||txt.includes(q);
        row.style.display=match?'':'none';
        if(match) anyMatch=true;
      });
      // If group title matches, show all
      var groupTitle=card.querySelector('div[style*="text-transform"]');
      if(groupTitle&&groupTitle.textContent.toLowerCase().includes(q)){
        card.querySelectorAll('div[style*="border-bottom"]').forEach(function(r){ r.style.display=''; });
        anyMatch=true;
      }
      card.style.display=(anyMatch||!q)?'':'none';
    });
  });

  // Approve/Reject ID requests
  ac.querySelectorAll('.approve-id-req').forEach(function(btn){
    btn.addEventListener('click',async function(){
      var player=btn.dataset.player; var newId=btn.dataset.newid; var reqType=btn.dataset.type||'id';
      if(reqType==='name'){
        // Name change - update all tables
        var r1=await sb.from('players').update({name:newId}).eq('name',player);
        if(r1.error){ toast('Error: '+r1.error.message); return; }
        var r2=await sb.from('alliance_reps').update({player_name:newId}).eq('player_name',player);
        if(r2.error){ toast('Error: '+r2.error.message); return; }
        var r3=await sb.from('admin_roles').update({player_name:newId}).eq('player_name',player);
        if(r3.error){ toast('Error: '+r3.error.message); return; }
        var r4=await sb.from('svs_rally_leaders').update({name:newId}).eq('name',player);
        if(r4.error){ toast('Error: '+r4.error.message); return; }
        var r7=await sb.from('push_subscriptions').update({player_name:newId}).eq('player_name',player);
        if(r7.error){ toast('Error: '+r7.error.message); return; }
        var p=ALL_PLAYERS.find(function(x){ return x.name===player; });
        if(p) p.name=newId;
        ALLIANCE_REPS.forEach(function(r){ if(r.player_name===player) r.player_name=newId; });
        SVS_LEADERS.forEach(function(l){ if(l.name===player) l.name=newId; });
        if(SESSION.name===player){ SESSION.name=newId; localStorage.setItem('wos-session',JSON.stringify(SESSION)); }
        toast('✅ Name changed: '+player+' → '+newId);

function simpleMarkdown(md){
  if(!md) return '';
  var lines = md.split('\n');
  var html = '';
  var inUl = false, inOl = false;
  for(var i=0;i<lines.length;i++){
    var l = lines[i];
    // Close lists if needed
    if(inUl && !/^\s*[-*]\s/.test(l)){ html+='</ul>'; inUl=false; }
    if(inOl && !/^\s*\d+\.\s/.test(l)){ html+='</ol>'; inOl=false; }

    if(/^###\s/.test(l)){       html+='<h3>'+inlineFormat(l.replace(/^###\s/,''))+'</h3>'; }
    else if(/^##\s/.test(l)){   html+='<h2>'+inlineFormat(l.replace(/^##\s/,''))+'</h2>'; }
    else if(/^#\s/.test(l)){    html+='<h1>'+inlineFormat(l.replace(/^#\s/,''))+'</h1>'; }
    else if(/^---+$/.test(l.trim())){ html+='<hr>'; }
    else if(/^>\s/.test(l)){    html+='<blockquote>'+inlineFormat(l.replace(/^>\s/,''))+'</blockquote>'; }
    else if(/^\s*[-*]\s/.test(l)){
      if(!inUl){ html+='<ul>'; inUl=true; }
      html+='<li>'+inlineFormat(l.replace(/^\s*[-*]\s/,''))+'</li>';
    }
    else if(/^\s*\d+\.\s/.test(l)){
      if(!inOl){ html+='<ol>'; inOl=true; }
      html+='<li>'+inlineFormat(l.replace(/^\s*\d+\.\s/,''))+'</li>';
    }
    else if(l.trim()===''){     html+='<p style="margin:4px 0;"></p>'; }
    else{                        html+='<p>'+inlineFormat(l)+'</p>'; }
  }
  if(inUl) html+='</ul>';
  if(inOl) html+='</ol>';
  return html;
}

function inlineFormat(t){
  t = t.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  t = t.replace(/`([^`]+)`/g,'<code>$1</code>');
  t = t.replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>');
  t = t.replace(/\*(.+?)\*/g,'<em>$1</em>');
  t = t.replace(/__(.+?)__/g,'<strong>$1</strong>');
  t = t.replace(/_(.+?)_/g,'<em>$1</em>');
  return t;
}

        '<label class="lbl">Title</label>'+
        '<input class="inp" id="rulesTitle" value="'+(e.title?escHtml(e.title):'')+'" placeholder="e.g. General Rules">'+
      '</div>'+
      '<div class="field">'+
        '<label class="lbl">Short Description (optional)</label>'+
        '<input class="inp" id="rulesDesc" value="'+(e.description?escHtml(e.description):'')+'" placeholder="One-line summary">'+
      '</div>'+
      '<div class="field">'+
        '<label class="lbl">Content (Markdown)</label>'+
        '<textarea class="inp" id="rulesContent" rows="10" style="resize:vertical;font-family:monospace;font-size:12px;line-height:1.6;" placeholder="# Title&#10;&#10;## Section&#10;&#10;- Rule 1&#10;- Rule 2&#10;&#10;**Bold** and *italic* supported.">'+(e.content?e.content.replace(/</g,'&lt;'):'')+'</textarea>'+
      '</div>'+
      '<div style="display:flex;gap:8px;">'+
        '<button class="btn btn-p" id="rulesSaveBtn" style="flex:1;">'+( isNew?'Add Topic':'Save Changes')+'</button>'+
        '<button class="btn btn-g btn-sm" id="rulesCancelBtn" style="width:auto;padding:13px 18px;">Cancel</button>'+
      '</div>'+
      (RULES_EDIT&&RULES_EDIT.id?'<div style="margin-top:10px;">'+
        '<div style="height:1px;background:var(--b);margin-bottom:10px;"></div>'+
        '<div style="font-size:10px;font-weight:800;color:var(--t3);text-transform:uppercase;letter-spacing:1px;margin-bottom:8px;">Markdown Preview</div>'+
        '<div class="rules-md" id="rulesMdPreview" style="font-size:12px;">'+simpleMarkdown(RULES_EDIT.content||'')+'</div>'+
      '</div>':'')+
    '</div>';
  })();

  el.innerHTML =
    '<div class="rules-admin-wrap">'+
      '<button class="btn btn-p" id="rulesNewBtn" style="margin-bottom:14px;">+ New Topic</button>'+
      (RULES_EDIT!==undefined ? formHtml : '')+
      listHtml+
    '</div>';

  // New button
  var newBtn = document.getElementById('rulesNewBtn');
  if(newBtn) newBtn.addEventListener('click',function(){
    RULES_EDIT = {}; renderRulesContent();
  });

  // Cancel
  var cancelBtn = document.getElementById('rulesCancelBtn');
  if(cancelBtn) cancelBtn.addEventListener('click',function(){ RULES_EDIT=undefined; renderRulesContent(); });

  // Live preview on content change
  var contentTa = document.getElementById('rulesContent');
  var previewEl = document.getElementById('rulesMdPreview');
  if(contentTa && previewEl){
    contentTa.addEventListener('input',function(){ previewEl.innerHTML=simpleMarkdown(contentTa.value); });
  }

  // Save
  var saveBtn = document.getElementById('rulesSaveBtn');
  if(saveBtn) saveBtn.addEventListener('click',async function(){
    var emoji = (document.getElementById('rulesEmoji').value.trim()||'📌');
    var title = document.getElementById('rulesTitle').value.trim();
    var desc  = document.getElementById('rulesDesc').value.trim();
    var content = document.getElementById('rulesContent').value;
    if(!title){ toast('⚠️ Title required'); return; }
    saveBtn.disabled=true; saveBtn.textContent='Saving...';
    if(RULES_EDIT&&RULES_EDIT.id){
      var r=await sb.from('rules_topics').update({emoji,title,description:desc,content}).eq('id',RULES_EDIT.id).select().single();
      if(r.error){ toast('Error: '+r.error.message); saveBtn.disabled=false; saveBtn.textContent='Save Changes'; return; }
      RULES_TOPICS=RULES_TOPICS.map(function(x){ return x.id===r.data.id?r.data:x; });
    } else {
      var maxOrder = RULES_TOPICS.length ? Math.max.apply(null,RULES_TOPICS.map(function(x){ return x.order_index||0; }))+1 : 0;
      var r=await sb.from('rules_topics').insert({emoji,title,description:desc,content,order_index:maxOrder}).select().single();
      if(r.error){ toast('Error: '+r.error.message); saveBtn.disabled=false; saveBtn.textContent='Add Topic'; return; }
      RULES_TOPICS.push(r.data);
    }
    RULES_EDIT=undefined; toast('✅ Saved!'); renderRulesContent();
  });

  // Edit buttons
  el.querySelectorAll('[data-edit]').forEach(function(btn){
    btn.addEventListener('click',function(){
      RULES_EDIT=RULES_TOPICS.find(function(x){ return x.id===btn.dataset.edit; });
      renderRulesContent();
    });
  });

  // Delete buttons
  el.querySelectorAll('[data-del]').forEach(function(btn){
    btn.addEventListener('click',async function(){
      if(!confirm('Delete this topic?')) return;
      var tid=btn.dataset.del;
      var r=await sb.from('rules_topics').delete().eq('id',tid);
      if(r.error){ toast('Error: '+r.error.message); return; }
      RULES_TOPICS=RULES_TOPICS.filter(function(x){ return x.id!==tid; });
      toast('🗑 Deleted'); renderRulesContent();
    });
  });

  // Move up/down
  el.querySelectorAll('[data-move-up]').forEach(function(btn){
    btn.addEventListener('click',async function(){
      var idx=RULES_TOPICS.findIndex(function(x){ return x.id===btn.dataset.moveUp; });
      if(idx<=0) return;
      var a=RULES_TOPICS[idx],b=RULES_TOPICS[idx-1];
      var tmpO=a.order_index; a.order_index=b.order_index; b.order_index=tmpO;
      var r1=await sb.from('rules_topics').update({order_index:a.order_index}).eq('id',a.id);
      var r2=await sb.from('rules_topics').update({order_index:b.order_index}).eq('id',b.id);
      if(r1.error||r2.error){ toast('Error: '+(r1.error||r2.error).message); }
      RULES_TOPICS.sort(function(x,y){ return x.order_index-y.order_index; });
      renderRulesContent();
    });
  });
  el.querySelectorAll('[data-move-dn]').forEach(function(btn){
    btn.addEventListener('click',async function(){
      var idx=RULES_TOPICS.findIndex(function(x){ return x.id===btn.dataset.moveDn; });
      if(idx<0||idx>=RULES_TOPICS.length-1) return;
      var a=RULES_TOPICS[idx],b=RULES_TOPICS[idx+1];
      var tmpO=a.order_index; a.order_index=b.order_index; b.order_index=tmpO;
      var r1=await sb.from('rules_topics').update({order_index:a.order_index}).eq('id',a.id);
      var r2=await sb.from('rules_topics').update({order_index:b.order_index}).eq('id',b.id);
      if(r1.error||r2.error){ toast('Error: '+(r1.error||r2.error).message); }
      RULES_TOPICS.sort(function(x,y){ return x.order_index-y.order_index; });
      renderRulesContent();
    });
  });
}

function renderCrazyJoeApp(app){
  var isSuper = isSuperAdmin(SESSION.name);
  var isCjAdm = isCjAdmin(SESSION.name);
  var myPlayer = ALL_PLAYERS.find(function(p){ return p.name===SESSION.name; });
  var myAlliance = isSuper ? null : (myPlayer&&myPlayer.alliance ? myPlayer.alliance : null);

  // Gate: non-super must have alliance
  if(!isSuper && !myAlliance){
    app.innerHTML=
      buildModuleHeader('crazyjoe','🤪','Crazy Joe','Team Assignments')+
      '<div class="empty"><div class="empty-icon">⚠️</div><p>Please set your Alliance in your profile before accessing this module.</p></div>';
    document.getElementById('backHome').addEventListener('click',function(){ MODULE=null; render(); });
    return;
  }

  // Super admin: alliance picker (view all or filter)
  var viewAlliance = isSuper ? (CJ_VIEW_ALLIANCE||'__all__') : myAlliance;

  var tabs = [{id:'board',icon:'👥',label:'Teams'}];
  if(isCjAdm) tabs.push({id:'admin',icon:'⚙️',label:'Admin'});

  var navHtml = tabs.map(function(t){
    return '<button class="nav-btn '+(CJ_TAB===t.id?'on':'')+'" data-tab="'+t.id+'">'+
      '<span class="ic">'+t.icon+'</span>'+t.label+'</button>';
  }).join('');

  app.innerHTML=
    buildModuleHeader('crazyjoe','🤪','Crazy Joe','Team Assignments')+
    '<div class="content" id="cjContent"></div>'+
    '<div class="footer">© 2026 State 2901 · All rights reserved · Designed by Otto</div>'+
    '<div class="nav">'+navHtml+'</div>';

  document.getElementById('backHome').addEventListener('click',function(){ MODULE=null; render(); });
  app.querySelectorAll('.nav-btn').forEach(function(btn){
    btn.addEventListener('click',function(){ CJ_TAB=btn.dataset.tab; renderCjContent(); });
  });

  var cjEl = document.getElementById('cjContent');

  function renderCjContent(){
    if(CJ_TAB==='board') renderCjBoard(cjEl, viewAlliance, isSuper, isCjAdm, myAlliance);
    if(CJ_TAB==='admin' && isCjAdm) renderCjAdmin(cjEl, isSuper, myAlliance);
  }
  renderCjContent();
}

function getCjAllianceFilter(isSuper, viewAlliance, myAlliance){
  if(isSuper && viewAlliance && viewAlliance!=='__all__') return viewAlliance;
  if(isSuper && (!viewAlliance||viewAlliance==='__all__')) return null; // all
  return myAlliance;
}

function renderCjBoard(el, viewAlliance, isSuper, isCjAdm, myAlliance){
  // Alliance selector for super admin
  var allianceFilter = getCjAllianceFilter(isSuper, viewAlliance, myAlliance);

  var alliances = [];
  if(isSuper){
    alliances = [...new Set(CJ_TEAMS.map(function(t){ return t.alliance; }))].sort();
  }

  var superAlliancePicker = '';
  if(isSuper){
    var alOpts = '<option value="__all__"'+(CJ_VIEW_ALLIANCE===null||CJ_VIEW_ALLIANCE==='__all__'?' selected':'')+'>All Alliances</option>'+
      alliances.map(function(al){
        return '<option value="'+al+'"'+(CJ_VIEW_ALLIANCE===al?' selected':'')+'>'+al+'</option>';
      }).join('');
    superAlliancePicker =
      '<div style="margin-bottom:14px;display:flex;align-items:center;gap:10px;">'+
        '<label style="font-size:11px;font-weight:700;color:rgba(230,213,180,.5);text-transform:uppercase;letter-spacing:.8px;flex-shrink:0;">View Alliance</label>'+
        '<select class="sel" id="cjAllianceSel" style="flex:1;">'+alOpts+'</select>'+
      '</div>';
  }

  // Filter teams
  var teams = allianceFilter
    ? CJ_TEAMS.filter(function(t){ return t.alliance===allianceFilter; })
    : CJ_TEAMS;

  if(!teams.length && !isSuper){
    el.innerHTML = superAlliancePicker +
      '<div class="empty"><div class="empty-icon">👥</div><p>No teams set up yet.<br>Your alliance admin will configure the teams.</p></div>';
    return;
  }
  if(!teams.length && isSuper){
    el.innerHTML = superAlliancePicker +
      '<div class="empty"><div class="empty-icon">👥</div><p>No teams found'+(allianceFilter?' for '+allianceFilter:'')+'.</p></div>';
    var alSel=el.querySelector('#cjAllianceSel');
    if(alSel) alSel.addEventListener('change',function(){ CJ_VIEW_ALLIANCE=this.value==='__all__'?null:this.value; render(); });
    return;
  }

  // Group by alliance if showing all
  var grouped = {};
  teams.forEach(function(t){
    if(!grouped[t.alliance]) grouped[t.alliance]=[];
    grouped[t.alliance].push(t);
  });

  var alKeys = Object.keys(grouped).sort();

  var html = superAlliancePicker;

  alKeys.forEach(function(al){
    var alTeams = grouped[al];
    if(alKeys.length>1){
      html += '<div style="font-size:11px;font-weight:800;text-transform:uppercase;letter-spacing:1px;color:rgba(230,213,180,.45);margin-bottom:8px;margin-top:4px;">'+al+'</div>';
    }

    // Copy all teams button (admin only)
    if(isCjAdm && (isSuper || al===myAlliance)){
      html += '<button class="btn btn-g btn-sm" id="cjCopyAll_'+al+'" style="margin-bottom:10px;width:100%;">📋 Copy All Teams</button>';
    }

    alTeams.forEach(function(team){
      var members = CJ_MEMBERS.filter(function(m){ return m.team_id===team.id; })
        .sort(function(a,b){ return a.position-b.position; });
      var memberCount = members.length;
      var countColor = memberCount>=6?'var(--green)':memberCount===0?'var(--t3)':'var(--orange)';

      html +=
        '<div class="card" style="margin-bottom:12px;">'+
          '<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;">'+
            '<div style="font-size:14px;font-weight:800;color:var(--t);">'+escHtml(team.team_name)+'</div>'+
            '<div style="display:flex;align-items:center;gap:8px;">'+
              '<span style="font-size:12px;font-weight:700;color:'+countColor+';">'+memberCount+'/6</span>'+
              (isCjAdm&&(isSuper||al===myAlliance)?
                '<button class="btn btn-g btn-sm" id="cjCopyTeam_'+team.id+'">📋 Copy</button>':'')+
            '</div>'+
          '</div>'+
          (memberCount===0
            ? '<div style="font-size:12px;color:var(--t3);text-align:center;padding:10px 0;">No members yet</div>'
            : '<div style="display:flex;flex-direction:column;gap:4px;">'+
                members.map(function(m,i){
                  return '<div style="display:flex;align-items:center;gap:10px;padding:6px 8px;background:rgba(255,255,255,.03);border-radius:8px;border:1px solid rgba(255,255,255,.06);">'+
                    '<span style="font-size:11px;font-weight:800;color:var(--t3);width:16px;text-align:right;">'+(i+1)+'.</span>'+
                    '<span style="font-size:13px;font-weight:600;">'+escHtml(m.player_name)+'</span>'+
                  '</div>';
                }).join('')+
              '</div>')+
        '</div>';
    });
  });

  el.innerHTML=html;

  // Alliance picker change
  var alSel=el.querySelector('#cjAllianceSel');
  if(alSel) alSel.addEventListener('change',function(){ CJ_VIEW_ALLIANCE=this.value==='__all__'?null:this.value; render(); });

  // Copy single team
  el.querySelectorAll('[id^="cjCopyTeam_"]').forEach(function(btn){
    btn.addEventListener('click',function(){
      var tid=btn.id.replace('cjCopyTeam_','');
      var team=CJ_TEAMS.find(function(t){ return t.id===tid; });
      if(!team) return;
      var members=CJ_MEMBERS.filter(function(m){ return m.team_id===tid; }).sort(function(a,b){ return a.position-b.position; });
      var text='👥 '+team.team_name+' ('+members.length+'/6)\n'+'─'.repeat(20)+'\n'+
        members.map(function(m,i){ return (i+1)+'. '+m.player_name; }).join('\n');
      navigator.clipboard.writeText(text).then(function(){ toast('✅ Team copied!'); });
    });
  });

  // Copy all teams per alliance
  alKeys.forEach(function(al){
    var btn=el.querySelector('#cjCopyAll_'+al);
    if(!btn) return;
    btn.addEventListener('click',function(){
      var alTeams=grouped[al];
      var lines=['🤪 CRAZY JOE — '+al,'━'.repeat(24),''];
      alTeams.forEach(function(team){
        var members=CJ_MEMBERS.filter(function(m){ return m.team_id===team.id; }).sort(function(a,b){ return a.position-b.position; });
        lines.push('👥 '+team.team_name+' ('+members.length+'/6)');
        members.forEach(function(m,i){ lines.push('  '+(i+1)+'. '+m.player_name); });
        lines.push('');
      });
      navigator.clipboard.writeText(lines.join('\n')).then(function(){ toast('✅ All teams copied!'); });
    });
  });
}

function renderCjAdmin(el, isSuper, myAlliance){
  // Admin sees only their alliance teams (super sees all)
  var myTeams = isSuper ? CJ_TEAMS : CJ_TEAMS.filter(function(t){ return t.alliance===myAlliance; });

  // My alliance players from DB (for picker)
  var alliancePlayers = isSuper ? ALL_PLAYERS : ALL_PLAYERS.filter(function(p){
    return p.alliance && p.alliance.toLowerCase()===(myAlliance||'').toLowerCase();
  });

  var teamListHtml = myTeams.length===0
    ? '<div class="empty" style="padding:20px 0;"><div class="empty-icon">👥</div><p>No teams yet. Create your first team below.</p></div>'
    : myTeams.map(function(team){
        var members = CJ_MEMBERS.filter(function(m){ return m.team_id===team.id; }).sort(function(a,b){ return a.position-b.position; });
        return '<div class="card" style="margin-bottom:10px;">'+
          '<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:6px;">'+
            '<div>'+
              '<div style="font-size:13px;font-weight:800;">'+escHtml(team.team_name)+'</div>'+
              (isSuper?'<div style="font-size:10px;color:var(--t3);">'+team.alliance+'</div>':'')+
            '</div>'+
            '<div style="display:flex;gap:6px;">'+
              '<button class="btn btn-g btn-sm cjEditTeamBtn" data-id="'+team.id+'" style="font-size:11px;">✏️ Edit</button>'+
              '<button class="btn btn-d btn-sm cjDelTeamBtn" data-id="'+team.id+'" style="font-size:11px;">🗑</button>'+
            '</div>'+
          '</div>'+
          '<div style="font-size:11px;color:var(--t3);">'+members.length+'/6 members — '+
            (members.length?members.map(function(m){ return m.player_name; }).join(', '):'Empty')+
          '</div>'+
        '</div>';
      }).join('');

  // Alliance selector for super admin when creating
  var superAlSelect = isSuper
    ? '<div class="field"><label class="lbl">Alliance</label>'+
        '<input class="inp" id="cjFormAlliance" placeholder="Alliance name (e.g. BST)" value="'+(CJ_VIEW_ALLIANCE&&CJ_VIEW_ALLIANCE!=='__all__'?CJ_VIEW_ALLIANCE:'')+'" autocomplete="off">'+
      '</div>'
    : '';

  // Member builder
  var memberRows = '';
  for(var i=1;i<=6;i++){
    // DB player options for this alliance
    var pOpts = '<option value="">— Select from roster —</option>'+
      alliancePlayers.map(function(p){ return '<option value="'+escHtml(p.name)+'">'+escHtml(p.name)+(p.alliance?' ['+p.alliance+']':'')+'</option>'; }).join('');
    memberRows +=
      '<div style="display:flex;align-items:center;gap:6px;margin-bottom:6px;" id="cjMemberRow_'+i+'">'+
        '<span style="font-size:11px;font-weight:800;color:var(--t3);width:14px;flex-shrink:0;">'+i+'.</span>'+
        '<select class="sel" id="cjMemberSel_'+i+'" style="flex:1;font-size:12px;">'+pOpts+'</select>'+
        '<input class="inp" id="cjMemberMan_'+i+'" placeholder="or type name" style="flex:1;font-size:12px;" autocomplete="off">'+
      '</div>';
  }

  el.innerHTML=
    '<div style="font-size:11px;font-weight:800;text-transform:uppercase;letter-spacing:.8px;color:rgba(230,213,180,.45);margin-bottom:10px;">Current Teams</div>'+
    teamListHtml+
    '<div style="height:1px;background:rgba(255,255,255,.07);margin:16px 0;"></div>'+
    '<div style="font-size:11px;font-weight:800;text-transform:uppercase;letter-spacing:.8px;color:rgba(230,213,180,.45);margin-bottom:10px;" id="cjFormTitle">➕ Add New Team</div>'+
    '<div id="cjFormCard" class="card" style="margin-bottom:12px;">'+
      superAlSelect+
      '<div class="field"><label class="lbl">Team Name</label>'+
        '<input class="inp" id="cjTeamName" placeholder="e.g. Team Alpha" autocomplete="off">'+
      '</div>'+
      '<div class="field">'+
        '<label class="lbl">Members <span style="font-size:10px;color:var(--t3);font-weight:500;">(select from roster or type manually)</span></label>'+
        memberRows+
      '</div>'+
      '<div style="display:flex;gap:8px;">'+
        '<button class="btn btn-p" id="cjSaveTeam" style="flex:1;">Save Team</button>'+
        '<button class="btn btn-g" id="cjCancelEdit" style="display:none;flex:1;">Cancel</button>'+
      '</div>'+
      '<div class="err" id="cjFormErr"></div>'+
    '</div>';

  // Bind edit/delete
  el.querySelectorAll('.cjEditTeamBtn').forEach(function(btn){
    btn.addEventListener('click',function(){
      var tid=btn.dataset.id;
      var team=CJ_TEAMS.find(function(t){ return t.id===tid; });
      if(!team) return;
      CJ_EDIT_TEAM=team;
      document.getElementById('cjFormTitle').textContent='✏️ Edit Team';
      document.getElementById('cjTeamName').value=team.team_name;
      if(isSuper&&document.getElementById('cjFormAlliance')) document.getElementById('cjFormAlliance').value=team.alliance||'';
      document.getElementById('cjCancelEdit').style.display='';
      // Fill members
      var members=CJ_MEMBERS.filter(function(m){ return m.team_id===tid; }).sort(function(a,b){ return a.position-b.position; });
      for(var i=1;i<=6;i++){
        var m=members[i-1];
        var selEl=document.getElementById('cjMemberSel_'+i);
        var manEl=document.getElementById('cjMemberMan_'+i);
        if(!m){ if(selEl) selEl.value=''; if(manEl) manEl.value=''; continue; }
        // Check if name matches a roster option
        var matchOpt=selEl?Array.from(selEl.options).find(function(o){ return o.value===m.player_name; }):null;
        if(matchOpt){ selEl.value=m.player_name; if(manEl) manEl.value=''; }
        else { if(selEl) selEl.value=''; if(manEl) manEl.value=m.player_name; }
      }
      document.getElementById('cjFormCard').scrollIntoView({behavior:'smooth',block:'start'});
    });
  });

  el.querySelectorAll('.cjDelTeamBtn').forEach(function(btn){
    btn.addEventListener('click',async function(){
      var tid=btn.dataset.id;
      var team=CJ_TEAMS.find(function(t){ return t.id===tid; });
      if(!team) return;
      if(!confirm('Delete team "'+team.team_name+'"? This cannot be undone.')) return;
      btn.disabled=true;
      await sb.from('cj_team_members').delete().eq('team_id',tid);
      await sb.from('cj_teams').delete().eq('id',tid);
      CJ_TEAMS=CJ_TEAMS.filter(function(t){ return t.id!==tid; });
      CJ_MEMBERS=CJ_MEMBERS.filter(function(m){ return m.team_id!==tid; });
      toast('✅ Team deleted.');
      renderCjAdmin(el, isSuper, myAlliance);
    });
  });

  document.getElementById('cjCancelEdit').addEventListener('click',function(){
    CJ_EDIT_TEAM=null;
    document.getElementById('cjFormTitle').textContent='➕ Add New Team';
    document.getElementById('cjTeamName').value='';
    for(var i=1;i<=6;i++){
      var s=document.getElementById('cjMemberSel_'+i); if(s) s.value='';
      var m=document.getElementById('cjMemberMan_'+i); if(m) m.value='';
    }
    if(isSuper&&document.getElementById('cjFormAlliance')) document.getElementById('cjFormAlliance').value='';
    document.getElementById('cjCancelEdit').style.display='none';
    document.getElementById('cjFormTitle').textContent='➕ Add New Team';
  });

  // When a roster select changes, clear the manual input and vice versa
  for(var i=1;i<=6;i++){
    (function(idx){
      var selEl=document.getElementById('cjMemberSel_'+idx);
      var manEl=document.getElementById('cjMemberMan_'+idx);
      if(selEl) selEl.addEventListener('change',function(){ if(this.value&&manEl) manEl.value=''; });
      if(manEl) manEl.addEventListener('input',function(){ if(this.value.trim()&&selEl) selEl.value=''; });
    })(i);
  }

  document.getElementById('cjSaveTeam').addEventListener('click',async function(){
    var saveBtn=this;
    var teamName=document.getElementById('cjTeamName').value.trim();
    var alliance=isSuper?(document.getElementById('cjFormAlliance')?document.getElementById('cjFormAlliance').value.trim().toUpperCase():''):myAlliance;
    var errEl=document.getElementById('cjFormErr');
    errEl.textContent='';

    if(!teamName){ errEl.textContent='Team name is required.'; return; }
    if(!alliance){ errEl.textContent='Alliance is required.'; return; }

    // Collect members (priority: manual input > select)
    var members=[];
    for(var i=1;i<=6;i++){
      var manEl=document.getElementById('cjMemberMan_'+i);
      var selEl=document.getElementById('cjMemberSel_'+i);
      var name=(manEl&&manEl.value.trim())||(selEl&&selEl.value)||'';
      if(name) members.push({name:name,pos:members.length+1});
    }

    saveBtn.disabled=true; saveBtn.textContent='Saving...';

    try{
      var teamId;
      if(CJ_EDIT_TEAM){
        // Update team
        var upd=await sb.from('cj_teams').update({team_name:teamName,alliance:alliance}).eq('id',CJ_EDIT_TEAM.id).select().single();
        if(upd.error) throw upd.error;
        teamId=CJ_EDIT_TEAM.id;
        CJ_TEAMS=CJ_TEAMS.map(function(t){ return t.id===teamId?upd.data:t; });
        // Delete old members
        await sb.from('cj_team_members').delete().eq('team_id',teamId);
        CJ_MEMBERS=CJ_MEMBERS.filter(function(m){ return m.team_id!==teamId; });
      } else {
        // Insert team
        var ins=await sb.from('cj_teams').insert({team_name:teamName,alliance:alliance}).select().single();
        if(ins.error) throw ins.error;
        teamId=ins.data.id;
        CJ_TEAMS.push(ins.data);
      }

      // Insert members
      if(members.length){
        var mRows=members.map(function(m){ return {team_id:teamId,player_name:m.name,position:m.pos}; });
        var mIns=await sb.from('cj_team_members').insert(mRows).select();
        if(mIns.error) throw mIns.error;
        CJ_MEMBERS=CJ_MEMBERS.concat(mIns.data);
      }

      CJ_EDIT_TEAM=null;
      toast('✅ Team saved!');
      renderCjAdmin(el, isSuper, myAlliance);
    } catch(e){
      errEl.textContent='Error: '+(e.message||'Unknown error');
    } finally {
      saveBtn.disabled=false; saveBtn.textContent='Save Team';
    }
  });
}

function escHtml(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

// ── PWA: SERVICE WORKER + PUSH ─────────────────────────────
const VAPID_PUBLIC = 'BJuz8Z1iiGP-hz1G5gUw2Uibj7H4rwEkCyCd40yLWa7-tfRab77t1W3fh3eEr77VeF1PgLkyj77QnnNu0BflEyY';

function urlB64ToUint8(b){
  var pad='='.repeat((4-b.length%4)%4);
  var raw=atob((b+pad).replace(/-/g,'+').replace(/_/g,'/'));
  return new Uint8Array([].map.call(raw,function(c){ return c.charCodeAt(0); }));
}

function isIOS(){ return /iPhone|iPad|iPod/.test(navigator.userAgent)&&!window.MSStream; }
function isStandalone(){ return window.matchMedia('(display-mode: standalone)').matches||window.navigator.standalone; }

// Register service worker
if('serviceWorker' in navigator){
  navigator.serviceWorker.register('/State-2901/sw.js',{scope:'/State-2901/'})
    .then(function(reg){ window._swReg=reg; })
    .catch(function(e){ console.warn('SW failed:',e); });
}

async function subscribePush(){
  if(!window._swReg||!SESSION) return false;
  try{
    var existing=await window._swReg.pushManager.getSubscription();
    if(existing){ await savePushSub(existing); return true; }
    var sub=await window._swReg.pushManager.subscribe({
      userVisibleOnly:true,
      applicationServerKey:urlB64ToUint8(VAPID_PUBLIC)
    });
    await savePushSub(sub);
    return true;
  }catch(e){ console.warn('Push sub failed:',e); return false; }
}

async function savePushSub(sub){
  if(!SESSION) return;
  var r=await sb.from('push_subscriptions').upsert({
    player_name: SESSION.name,
    endpoint:    sub.endpoint,
    subscription: sub.toJSON()
  },{onConflict:'endpoint'});
  if(r.error) console.warn('Push subscription save failed:',r.error.message);
}

async function requestPushPermission(){
  if(!('Notification' in window)) return 'unsupported';
  if(Notification.permission==='granted'){ await subscribePush(); return 'granted'; }
  if(Notification.permission==='denied') return 'denied';
  var perm=await Notification.requestPermission();
  if(perm==='granted') await subscribePush();
  return perm;
}
