// ROTATION MODULE
// ═══════════════════════════════════════════════════════

var TOP4 = ['HUM','SEA','FAL','BST'];
var BOT5 = ['WLF','LHC','DND','FAM','CHB'];
var ALL_ALLIANCES = ['HUM','SEA','FAL','BST','WLF','LHC','DND','FAM','CHB'];
var ALLIANCE_COLORS = {
  HUM:'#2a9fd6',SEA:'#52c759',FAL:'#ff9500',BST:'#ff453a',
  WLF:'#bf5af2',LHC:'#ffd60a',DND:'#30d158',FAM:'#ff6b6b',CHB:'#64d2ff'
};

function isRotAdmin(name){ return isSuperAdmin(name)||ALLIANCE_REPS.some(function(r){ return r.player_name===name; }); }

function getCurrentWeekStart(){
  var now=new Date();
  var day=now.getUTCDay();
  var diff=day===0?-6:1-day;
  var monday=new Date(Date.UTC(now.getUTCFullYear(),now.getUTCMonth(),now.getUTCDate()+diff));
  return monday.toISOString();
}

function getRotOrder(){
  if(!ROT_STATE) return {order:[],top4:[],bot5:[]};
  var top4=ROT_STATE.top4_order||TOP4;
  var bot5=ROT_STATE.bot5_order||BOT5;
  // Full order: top4 first, then bot5
  var order=top4.concat(bot5);
  return {order:order,top4:top4,bot5:bot5};
}

function getCurrentWeekSels(){
  if(!ROT_STATE) return [];
  var ws=ROT_STATE.week_start;
  return ROT_SELS.filter(function(s){ return s.week_start===ws; });
}

function getCurrentTurnAlliance(){
  var ro=getRotOrder();
  var sels=getCurrentWeekSels();
  var done=sels.map(function(s){ return s.alliance; });
  for(var i=0;i<ro.order.length;i++){
    if(!done.includes(ro.order[i])) return ro.order[i];
  }
  return null; // all done
}

function getReward(type,num){
  var r=ROT_REWARDS.find(function(x){ return x.location_type===type&&x.location_num===num; });
  return r?r.reward_text:'';
}

function allSelsDone(){
  var sels=getCurrentWeekSels();
  return sels.length===9;
}

// ── RENDER ROTATION APP ─────────────────────────────────
function renderRotApp(app){
  var canAdmin=isSuperAdmin(SESSION.name);
  var isRep=MY_ALLIANCE!==null;
  var chipCls=isSuperAdmin(SESSION.name)?'player-chip adm':'player-chip';
  var tabs=[{id:'board',icon:'🏰',label:'Board'},{id:'register',icon:'📝',label:'My Selection'}];
  if(canAdmin) tabs.push({id:'admin',icon:'👑',label:'Admin'});
  var navHtml=tabs.map(function(t){
    return '<button class="nav-btn '+(t.id==='admin'?'adm-btn ':'')+( ROT_TAB===t.id?'on':'')+'" data-tab="'+t.id+'"><span class="ic">'+t.icon+'</span>'+t.label+'</button>';
  }).join('');

  app.innerHTML=
    '<div class="hdr">'+
      '<div class="hdr-brand">'+
        '<button style="background:rgba(126,200,227,.1);border:1px solid rgba(126,200,227,.2);color:#7ec8e3;font-size:14px;font-weight:700;cursor:pointer;padding:6px 12px;border-radius:8px;margin-right:8px;font-family:Nunito,sans-serif;" id="backHome">← Back</button>'+
        '<div class="hdr-logo">🏰</div>'+
        '<div><div class="hdr-title">Stronghold Rotation</div><div class="hdr-sub">State 2901 · Weekly Selection</div></div>'+
      '</div>'+
      '<div style="display:flex;align-items:center;justify-content:space-between;margin-top:8px;">'+
        '<div class="'+chipCls+'" id="logoutBtn">'+(isSuperAdmin(SESSION.name)?'👑':isRep?'🏳️':'👤')+' '+SESSION.name+(MY_ALLIANCE?' ('+MY_ALLIANCE+')':'')+' <span style="font-size:10px;opacity:.4">✕</span></div>'+
        '<button class="guide-btn" id="rotGuideBtn">📖 How to use</button>'+
      '</div>'+
    '</div>'+
    '<div class="content" id="rotContent"></div>'+
    '<div class="footer">© 2026 State 2901 · All rights reserved · Designed by Otto</div>'+
    '<div class="nav">'+navHtml+'</div>';

  document.getElementById('logoutBtn').addEventListener('click',logout);
  document.getElementById('backHome').addEventListener('click',function(){ MODULE=null; render(); });
  var rgb=document.getElementById('rotGuideBtn');
  if(rgb) rgb.addEventListener('click',function(){ SHOW_GUIDE=true; renderGuide(); });
  app.querySelectorAll('.nav-btn').forEach(function(btn){ btn.addEventListener('click',function(){ ROT_TAB=btn.dataset.tab; if(btn.dataset.tab!=='register') window._superAdminAlliance=null; render(); }); });

  var rc=document.getElementById('rotContent');
  if(ROT_TAB==='board')    renderRotBoard(rc);
  if(ROT_TAB==='register') renderRotSelect(rc);
  if(ROT_TAB==='admin'&&canAdmin) renderRotAdmin(rc);
}

// ── BOARD ────────────────────────────────────────────────
function renderRotBoard(rc){
  var sels=getCurrentWeekSels();
  var ro=getRotOrder();
  var currentTurn=getCurrentTurnAlliance();
  var done=allSelsDone();

  // Build taken maps
  var takenSH={}, takenFT={};
  sels.forEach(function(s){
    if(s.stronghold) takenSH[s.stronghold]=s.alliance;
    if(s.fort) takenFT[s.fort]=s.alliance;
  });

  // Turn banner
  var bannerHtml='';
  if(done){
    bannerHtml='<div class="rot-turn-banner" style="background:linear-gradient(135deg,rgba(52,199,89,.1),rgba(30,200,100,.1));border-color:rgba(52,199,89,.3);">'+
      '<div class="rot-turn-alliance" style="color:#52c759;">✅ All selections complete!</div>'+
      '<div class="rot-turn-sub">See the final board below</div>'+
    '</div>';
  } else if(currentTurn){
    var isMyTurn=MY_ALLIANCE===currentTurn;
    bannerHtml='<div class="rot-turn-banner">'+
      '<div class="rot-turn-sub">Current turn:</div>'+
      '<div class="rot-turn-alliance" style="color:'+(ALLIANCE_COLORS[currentTurn]||'#ffd60a')+'">'+currentTurn+'</div>'+
      (isMyTurn?'<div class="rot-turn-sub" style="color:#52c759;margin-top:6px;">⭐ It&apos;s your turn! Go to My Selection tab.</div>':'<div class="rot-turn-sub">Waiting for their selection...</div>')+
    '</div>';
  }

  var canAdminBoard=isSuperAdmin(SESSION.name);
  // Strongholds grid
  var shHtml='';
  for(var i=1;i<=4;i++){
    var ally=takenSH[i];
    var reward=getReward('stronghold',i);
    var cls=ally?'rot-loc-taken':'rot-loc-free';
    var color=ally?(ALLIANCE_COLORS[ally]||'#7ec8e3'):'#4a7a9b';
    var adminBtn=canAdminBoard&&ally?'<button class="del-sel-btn" data-alliance="'+ally+'" style="background:none;border:none;color:#ff453a;font-size:11px;cursor:pointer;margin-top:4px;">✕ Remove</button>':'';
    shHtml+='<div class="rot-loc '+cls+'">'+
      '<div class="rot-loc-name">🏰 SH '+i+'</div>'+
      (ally?'<div class="rot-loc-alliance" style="color:'+color+';">'+ally+'</div>':'<div class="rot-loc-alliance" style="color:#2a4a65;">Available</div>')+
      (reward?'<div class="rot-loc-reward">'+reward+'</div>':'')+
      adminBtn+
    '</div>';
  }

  // Forts grid
  var ftHtml='';
  for(var j=1;j<=12;j++){
    var fally=takenFT[j];
    var freward=getReward('fort',j);
    var fcls=fally?'rot-loc-taken':(done?'rot-loc-open':'rot-loc-free');
    var fcolor=fally?(ALLIANCE_COLORS[fally]||'#7ec8e3'):(done?'#52c759':'#4a7a9b');
    var fadminBtn=canAdminBoard&&fally?'<button class="del-sel-btn" data-alliance="'+fally+'" style="background:none;border:none;color:#ff453a;font-size:11px;cursor:pointer;margin-top:4px;">✕ Remove</button>':'';
    ftHtml+='<div class="rot-loc '+fcls+'">'+
      '<div class="rot-loc-name">🏯 F'+j+'</div>'+
      (fally?'<div class="rot-loc-alliance" style="color:'+fcolor+';">'+fally+'</div>':(done?'<div class="rot-loc-alliance" style="color:#52c759;">FREE</div>':'<div class="rot-loc-alliance" style="color:#2a4a65;">Available</div>'))+
      (freward?'<div class="rot-loc-reward">'+freward+'</div>':'')+
      fadminBtn+
    '</div>';
  }

  // Order list
  var orderHtml='';
  ro.order.forEach(function(ally,idx){
    var sel=sels.find(function(s){ return s.alliance===ally; });
    var isCurrent=ally===currentTurn;
    var color=ALLIANCE_COLORS[ally]||'#7ec8e3';
    var status=sel?'<span class="rot-order-done">✅ Done</span>':(isCurrent?'<span class="rot-order-waiting">⏳ Selecting...</span>':'<span class="rot-order-pending">Waiting</span>');
    var isTop=idx<4;
    orderHtml+='<div class="rot-order-row '+(isCurrent?'rot-current':'')+'" style="'+(isCurrent?'background:rgba(255,214,10,.06);border-radius:8px;padding:6px 8px;':'')+'">'+
      '<div class="rot-order-num">'+(idx+1)+'</div>'+
      '<div class="rot-order-name" style="color:'+color+';">'+ally+(isTop?' <span style="font-size:9px;color:#4a7a9b;">SH+F</span>':' <span style="font-size:9px;color:#4a7a9b;">F only</span>')+'</div>'+
      status+
    '</div>';
  });

  // Final board
  var finalHtml='';
  if(done){
    var shFinalSlots='';
    for(var fi=1;fi<=4;fi++){
      var fa=takenSH[fi]||'';
      shFinalSlots+='<div class="final-slot">'+
        '<div class="final-slot-num">SH'+fi+'</div>'+
        '<div class="final-slot-name" style="color:'+(ALLIANCE_COLORS[fa]||'#7ec8e3')+';">'+fa+'</div>'+
      '</div>';
    }
    var ftFinalSlots='';
    for(var fj=1;fj<=12;fj++){
      var ffa=takenFT[fj]||'';
      var isOpen=!ffa;
      ftFinalSlots+='<div class="final-slot '+(isOpen?'final-slot-open':'')+'">'+
        '<div class="final-slot-num">F'+fj+'</div>'+
        '<div class="final-slot-name" style="color:'+(isOpen?'#52c759':(ALLIANCE_COLORS[ffa]||'#7ec8e3'))+';">'+(isOpen?'FREE':ffa)+'</div>'+
      '</div>';
    }
    var copyText='🏰 Strongholds\n';
    copyText+='1. '+(takenSH[1]||'FREE')+'   2. '+(takenSH[2]||'FREE')+'\n';
    copyText+='3. '+(takenSH[3]||'FREE')+'   4. '+(takenSH[4]||'FREE')+'\n';
    copyText+='\n🏯 Forts\n';
    for(var cj=1;cj<=12;cj++){
      copyText+=(cj)+'. '+(takenFT[cj]||'FREE');
      if(cj%3===0) copyText+='\n'; else copyText+='   ';
    }

    finalHtml='<div class="final-board">'+
      '<div class="rot-section-title">🏰 Strongholds</div>'+
      '<div class="final-row">'+shFinalSlots+'</div>'+
      '<div class="rot-section-title" style="margin-top:12px;">🏯 Forts</div>'+
      '<div style="display:grid;grid-template-columns:repeat(4,1fr);gap:6px;">'+ftFinalSlots+'</div>'+
      '<button class="copy-btn" id="copyResultBtn">📋 Copy Result for Announcement</button>'+
    '</div>';

    // Store copyText for button
    window._rotCopyText=copyText;
  }

  // Reps list (visible to all)
  var repsByAl={};
  ALLIANCE_REPS.forEach(function(r){ if(!repsByAl[r.alliance]) repsByAl[r.alliance]=[]; repsByAl[r.alliance].push(r.player_name); });
  var repsHtml='<div style="background:rgba(13,31,53,.6);border:1px solid rgba(100,160,220,.1);border-radius:14px;padding:14px;margin-top:12px;">'+
    '<div class="rot-section-title">🏳️ Alliance Representatives</div>'+
    '<div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;">'+
    ALL_ALLIANCES.map(function(al){
      var reps=repsByAl[al]||[];
      var color=ALLIANCE_COLORS[al]||'#7ec8e3';
      return '<div style="background:rgba(7,20,38,.4);border:1px solid rgba(100,160,220,.1);border-radius:10px;padding:10px;">'+
        '<div style="font-size:11px;font-weight:800;color:'+color+';margin-bottom:6px;">'+al+'</div>'+
        (reps.length?reps.map(function(n){ return '<div style="font-size:11px;color:#8ab4cc;font-weight:600;">👤 '+n+'</div>'; }).join(''):'<div style="font-size:10px;color:#2a4a65;">No rep</div>')+
      '</div>';
    }).join('')+
    '</div>'+
  '</div>';

  rc.innerHTML=
    bannerHtml+
    '<div class="rot-section-title">📋 Selection Order</div>'+
    '<div class="rot-order" style="margin-bottom:12px;">'+orderHtml+'</div>'+
    '<div class="rot-section-title">🏰 Strongholds</div>'+
    '<div class="rot-grid-4" style="margin-bottom:12px;">'+shHtml+'</div>'+
    '<div class="rot-section-title">🏯 Forts</div>'+
    '<div class="rot-grid-12">'+ftHtml+'</div>'+
    finalHtml+
    repsHtml;

  var cpBtn=document.getElementById('copyResultBtn');
  if(cpBtn) cpBtn.addEventListener('click',function(){ navigator.clipboard.writeText(window._rotCopyText||'').then(function(){ toast('📋 Copied to clipboard!'); }); });

  rc.querySelectorAll('.del-sel-btn').forEach(function(btn){
    btn.addEventListener('click',async function(){
      var al=btn.dataset.alliance;
      if(!confirm('Remove selection for '+al+'?')) return;
      var ws=ROT_STATE.week_start;
      var r=await sb.from('rotation_selections').delete().eq('week_start',ws).eq('alliance',al);
      if(r.error){ toast('Error: '+r.error.message); return; }
      ROT_SELS=ROT_SELS.filter(function(s){ return !(s.week_start===ws&&s.alliance===al); });
      toast(al+' selection removed'); render();
    });
  });
}

// ── SELECTION PANEL ──────────────────────────────────────
function renderRotSelect(rc){
  if(!MY_ALLIANCE&&!isSuperAdmin(SESSION.name)){
    rc.innerHTML='<div class="empty"><div class="empty-icon">🔒</div><p>You are not registered as an alliance representative.<br>Contact the admin.</p></div>';
    return;
  }

  // Super admin: show alliance picker if no alliance set
  if(isSuperAdmin(SESSION.name)&&!window._superAdminAlliance){
    var selsNow=getCurrentWeekSels();
    var doneSels=selsNow.map(function(s){ return s.alliance; });
    rc.innerHTML=
      '<div class="card">'+
        '<div style="font-family:Cinzel,serif;font-size:15px;color:#ffd60a;margin-bottom:14px;">👑 Select on behalf of:</div>'+
        '<div style="display:grid;grid-template-columns:repeat(3,1fr);gap:8px;">'+
        ALL_ALLIANCES.map(function(al){
          var done=doneSels.includes(al);
          var color=ALLIANCE_COLORS[al]||'#7ec8e3';
          return '<button class="tog" data-al="'+al+'" style="border-color:'+(done?'rgba(52,199,89,.3)':'rgba(100,160,220,.2)')+';color:'+(done?'#52c759':color)+';opacity:'+(done?'0.6':'1')+';">'+
            al+(done?' ✅':'')+
          '</button>';
        }).join('')+
        '</div>'+
      '</div>';
    rc.querySelectorAll('[data-al]').forEach(function(btn){
      btn.addEventListener('click',function(){
        window._superAdminAlliance=btn.dataset.al;
        render();
      });
    });
    return;
  }

  var sels=getCurrentWeekSels();
  var currentTurn=getCurrentTurnAlliance();
  var myAlliance=MY_ALLIANCE||(isSuperAdmin(SESSION.name)?window._superAdminAlliance:null);
  var mySel=sels.find(function(s){ return s.alliance===myAlliance; });
  var ro=getRotOrder();
  var isTop4=ro.top4.includes(myAlliance);
  var isMyTurn=currentTurn===myAlliance;

  if(mySel){
    rc.innerHTML='<div class="card" style="text-align:center;">'+
      '<div style="font-size:40px;margin-bottom:12px;">✅</div>'+
      '<div style="font-family:Cinzel,serif;font-size:16px;color:#52c759;margin-bottom:8px;">Selection Complete</div>'+
      '<div style="font-size:13px;color:#4a7a9b;margin-bottom:16px;">'+myAlliance+' has made its selection for this week.</div>'+
      (isTop4&&mySel.stronghold?'<div style="font-size:13px;color:#d4eaf7;margin-bottom:6px;">🏰 Stronghold '+mySel.stronghold+'</div>':'')+
      (mySel.fort?'<div style="font-size:13px;color:#d4eaf7;">🏯 Fort '+mySel.fort+'</div>':'')+
      (function(){
      var ro2=getRotOrder();
      var myPos=ro2.order.indexOf(myAlliance);
      var nextAl=myPos<ro2.order.length-1?ro2.order[myPos+1]:null;
      var nextSel=nextAl?sels.find(function(s){ return s.alliance===nextAl; }):null;
      var canUndo=isSuperAdmin(SESSION.name)||(nextAl&&!nextSel);
      return canUndo?'<button class="btn btn-d btn-sm" id="undoSelBtn" style="margin-top:16px;width:auto;padding:8px 16px;">↩ Undo Selection</button>':
        '<div style="font-size:11px;color:#2a4a65;margin-top:12px;">Undo not available — next alliance has already selected.</div>';
    })()+
    '</div>';
    var undoBtn=document.getElementById('undoSelBtn');
    if(undoBtn) undoBtn.addEventListener('click',async function(){
      if(!confirm('Undo '+myAlliance+'\'s selection?')) return;
      var r=await sb.from('rotation_selections').delete().eq('week_start',ROT_STATE.week_start).eq('alliance',myAlliance);
      if(r.error){ toast('Error: '+r.error.message); return; }
      ROT_SELS=ROT_SELS.filter(function(s){ return !(s.week_start===ROT_STATE.week_start&&s.alliance===myAlliance); });
      toast('Selection undone'); render();
    });
    return;
  }

  if(!isMyTurn&&!isSuperAdmin(SESSION.name)&&myAlliance!==currentTurn){
    var pos=ro.order.indexOf(myAlliance);
    var doneCount=sels.length;
    rc.innerHTML='<div class="card" style="text-align:center;">'+
      '<div style="font-size:40px;margin-bottom:12px;">⏳</div>'+
      '<div style="font-family:Cinzel,serif;font-size:16px;color:#ffd60a;margin-bottom:8px;">Not Your Turn Yet</div>'+
      '<div style="font-size:13px;color:#4a7a9b;">Currently: <strong style="color:'+(ALLIANCE_COLORS[currentTurn]||'#ffd60a')+';">'+currentTurn+'</strong> is selecting.<br>Your position: <strong style="color:#7ec8e3;">#'+(pos+1)+'</strong></div>'+
    '</div>';
    return;
  }

  // Build taken maps
  var takenSH={}, takenFT={};
  sels.forEach(function(s){ if(s.stronghold) takenSH[s.stronghold]=s.alliance; if(s.fort) takenFT[s.fort]=s.alliance; });

  var selSH=null, selFT=null;

  // Stronghold picker (only for top4)
  var shPickerHtml='';
  if(isTop4){
    shPickerHtml='<div class="rot-section-title">🏰 Choose Stronghold</div>'+
      '<div class="rot-grid-4" id="shPicker" style="margin-bottom:14px;">';
    for(var i=1;i<=4;i++){
      var taken=takenSH[i];
      var reward=getReward('stronghold',i);
      if(taken){
        shPickerHtml+='<div class="rot-loc rot-loc-taken">'+
          '<div class="rot-loc-name">SH '+i+'</div>'+
          '<div class="rot-loc-alliance" style="color:'+(ALLIANCE_COLORS[taken]||'#4a7a9b')+';">'+taken+'</div>'+
          (reward?'<div class="rot-loc-reward">'+reward+'</div>':'')+
        '</div>';
      } else {
        shPickerHtml+='<div class="rot-loc rot-loc-free pick-sh" data-sh="'+i+'">'+
          '<div class="rot-loc-name">SH '+i+'</div>'+
          '<div class="rot-loc-alliance" style="color:#2a4a65;">Tap to select</div>'+
          (reward?'<div class="rot-loc-reward">'+reward+'</div>':'')+
        '</div>';
      }
    }
    shPickerHtml+='</div>';
  }

  // Fort picker
  var ftPickerHtml='<div class="rot-section-title">🏯 Choose Fort</div>'+
    '<div class="rot-grid-12" id="ftPicker" style="margin-bottom:14px;">';
  for(var j=1;j<=12;j++){
    var ftaken=takenFT[j];
    var freward=getReward('fort',j);
    if(ftaken){
      ftPickerHtml+='<div class="rot-loc rot-loc-taken">'+
        '<div class="rot-loc-name">F'+j+'</div>'+
        '<div class="rot-loc-alliance" style="color:'+(ALLIANCE_COLORS[ftaken]||'#4a7a9b')+';">'+ftaken+'</div>'+
        (freward?'<div class="rot-loc-reward">'+freward+'</div>':'')+
      '</div>';
    } else {
      ftPickerHtml+='<div class="rot-loc rot-loc-free pick-ft" data-ft="'+j+'">'+
        '<div class="rot-loc-name">F'+j+'</div>'+
        '<div class="rot-loc-alliance" style="color:#2a4a65;">Tap</div>'+
        (freward?'<div class="rot-loc-reward">'+freward+'</div>':'')+
      '</div>';
    }
  }
  ftPickerHtml+='</div>';

  rc.innerHTML=
    (isSuperAdmin(SESSION.name)?'<button class="btn btn-g" style="margin-bottom:10px;padding:8px;font-size:12px;" id="backAlliancePick">← Change Alliance</button>':'')+
    '<div class="rot-turn-banner" style="margin-bottom:14px;">'+
      '<div class="rot-turn-sub">Making selection for:</div>'+
      '<div class="rot-turn-alliance" style="color:'+(ALLIANCE_COLORS[myAlliance]||'#ffd60a')+';">'+myAlliance+'</div>'+
    '</div>'+
    '<div id="selPreview" style="background:rgba(13,31,53,.6);border:1px solid rgba(100,160,220,.1);border-radius:12px;padding:12px;margin-bottom:14px;font-size:13px;color:#4a7a9b;text-align:center;">'+
      (isTop4?'Select a Stronghold and a Fort':'Select a Fort')+
    '</div>'+
    shPickerHtml+ftPickerHtml+
    '<button class="btn btn-p" id="confirmSelBtn" disabled>Confirm Selection</button>';

  // Selection logic
  var mySelSH=null, mySelFT=null;
  function updatePreview(){
    var txt=(isTop4?'SH: '+(mySelSH?mySelSH:'—')+'  ':'')+'Fort: '+(mySelFT?mySelFT:'—');
    document.getElementById('selPreview').innerHTML='<span style="color:#d4eaf7;font-weight:700;">'+txt+'</span>';
    var ready=(!isTop4||mySelSH)&&mySelFT;
    document.getElementById('confirmSelBtn').disabled=!ready;
  }

  rc.querySelectorAll('.pick-sh').forEach(function(el){
    el.addEventListener('click',function(){
      rc.querySelectorAll('.pick-sh').forEach(function(e){ e.classList.remove('rot-loc-mine'); e.querySelector('.rot-loc-alliance').textContent='Tap to select'; e.querySelector('.rot-loc-alliance').style.color='#2a4a65'; });
      el.classList.add('rot-loc-mine');
      el.querySelector('.rot-loc-alliance').textContent='Selected ✓';
      el.querySelector('.rot-loc-alliance').style.color='#ffd60a';
      mySelSH=parseInt(el.dataset.sh);
      updatePreview();
    });
  });

  rc.querySelectorAll('.pick-ft').forEach(function(el){
    el.addEventListener('click',function(){
      rc.querySelectorAll('.pick-ft').forEach(function(e){ e.classList.remove('rot-loc-mine'); e.querySelector('.rot-loc-alliance').textContent='Tap'; e.querySelector('.rot-loc-alliance').style.color='#2a4a65'; });
      el.classList.add('rot-loc-mine');
      el.querySelector('.rot-loc-alliance').textContent='Selected ✓';
      el.querySelector('.rot-loc-alliance').style.color='#ffd60a';
      mySelFT=parseInt(el.dataset.ft);
      updatePreview();
    });
  });

  var backBtn=document.getElementById('backAlliancePick');
  if(backBtn) backBtn.addEventListener('click',function(){ window._superAdminAlliance=null; render(); });

  document.getElementById('confirmSelBtn').addEventListener('click',async function(){
    if((!isTop4||mySelSH)&&mySelFT){
      var confirmMsg='Confirm selection for '+myAlliance+'?\n'+(isTop4?'Stronghold '+mySelSH+'\n':'')+'Fort '+mySelFT+'\n\nThis cannot be undone!';
      if(!confirm(confirmMsg)) return;
      var newSel={week_start:ROT_STATE.week_start,alliance:myAlliance,fort:mySelFT,confirmed:true,selected_by:SESSION.name};
      if(isTop4) newSel.stronghold=mySelSH;
      var r=await sb.from('rotation_selections').upsert(newSel,{onConflict:'week_start,alliance'}).select().single();
      if(r.error){ toast('Error: '+r.error.message); return; }
      ROT_SELS=ROT_SELS.filter(function(s){ return !(s.week_start===ROT_STATE.week_start&&s.alliance===myAlliance); });
      ROT_SELS.push(r.data);
      toast('✅ Selection confirmed!');
      window._superAdminAlliance=null;
      ROT_TAB='board'; render();
    }
  });
}

// ── ROTATION ADMIN ───────────────────────────────────────
function renderRotAdmin(rc){
  if(!isSuperAdmin(SESSION.name)){ rc.innerHTML='<div class="empty"><div class="empty-icon">🔒</div><p>Access denied.</p></div>'; return; }

  var ro=getRotOrder();
  var top4str=ro.top4.join(', ');
  var bot5str=ro.bot5.join(', ');
  var weekStart=ROT_STATE?new Date(ROT_STATE.week_start).toLocaleDateString('en-GB',{day:'2-digit',month:'short',year:'numeric'}):'—';

  // Rep management
  // Group reps by alliance
  var repByAlliance={};
  ALLIANCE_REPS.forEach(function(r){ if(!repByAlliance[r.alliance]) repByAlliance[r.alliance]=[]; repByAlliance[r.alliance].push(r); });
  var repRows=ALL_ALLIANCES.map(function(al){
    var reps=repByAlliance[al]||[];
    var color=ALLIANCE_COLORS[al]||'#7ec8e3';
    return '<div style="margin-bottom:10px;">'+
      '<div style="font-size:11px;font-weight:800;color:'+color+';text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px;">'+al+' ('+reps.length+')</div>'+
      (reps.length?reps.map(function(r){
        return '<div style="display:flex;justify-content:space-between;align-items:center;padding:5px 8px;background:rgba(7,20,38,.4);border-radius:8px;margin-bottom:4px;">'+
          '<span style="font-size:12px;font-weight:700;color:#d4eaf7;">'+r.player_name+'</span>'+
          '<button class="btn btn-d btn-sm revoke-rep" data-player="'+r.player_name+'" style="padding:4px 8px;font-size:10px;">Remove</button>'+
        '</div>';
      }).join(''):'<div style="font-size:11px;color:#2a4a65;padding:4px 8px;">No rep assigned</div>')+
    '</div>';
  }).join('');

  // Reward editor
  var rewardRows='';
  for(var i=1;i<=4;i++){
    rewardRows+='<div style="margin-bottom:8px;"><div style="font-size:11px;color:#7ec8e3;font-weight:700;">🏰 Stronghold '+i+'</div>'+
      '<input class="reward-inp" data-type="stronghold" data-num="'+i+'" value="'+getReward('stronghold',i)+'"></div>';
  }
  for(var j=1;j<=12;j++){
    rewardRows+='<div style="margin-bottom:8px;"><div style="font-size:11px;color:#8ab4cc;font-weight:700;">🏯 Fort '+j+'</div>'+
      '<input class="reward-inp" data-type="fort" data-num="'+j+'" value="'+getReward('fort',j)+'"></div>';
  }

  // Build alliance management UI
  function allianceRow(al, idx, group){
    var color=ALLIANCE_COLORS[al]||'#7ec8e3';
    var isTop=group==='top4';
    var arr=isTop?ro.top4:ro.bot5;
    var canUp=idx>0;
    var canDown=idx<arr.length-1;
    return '<div class="rot-alliance-row" data-al="'+al+'" data-group="'+group+'" data-idx="'+idx+'">'+
      '<div style="width:20px;text-align:center;font-size:11px;color:#2a4a65;">'+(idx+1)+'</div>'+
      '<div style="flex:1;font-size:13px;font-weight:800;color:'+color+';">'+al+'</div>'+
      '<div style="display:flex;gap:4px;">'+
        '<button class="rot-act-btn rename-al" data-al="'+al+'" data-group="'+group+'" title="Rename">✏️</button>'+
        '<button class="rot-act-btn move-up-al" data-al="'+al+'" data-group="'+group+'" data-idx="'+idx+'" '+(canUp?'':'disabled')+' title="Move up">▲</button>'+
        '<button class="rot-act-btn move-dn-al" data-al="'+al+'" data-group="'+group+'" data-idx="'+idx+'" '+(canDown?'':'disabled')+' title="Move down">▼</button>'+
        '<button class="rot-act-btn move-grp-al" data-al="'+al+'" data-group="'+group+'" title="'+(isTop?'Move to Bot 5':'Move to Top 4')+'">'+(isTop?'↓':'↑')+'</button>'+
      '</div>'+
    '</div>';
  }

  var top4Rows=ro.top4.map(function(al,i){ return allianceRow(al,i,'top4'); }).join('');
  var bot5Rows=ro.bot5.map(function(al,i){ return allianceRow(al,i,'bot5'); }).join('');

  rc.innerHTML=
    '<div style="background:rgba(13,31,53,.6);border:1px solid rgba(100,160,220,.1);border-radius:14px;padding:14px;margin-bottom:12px;">'+
      '<div class="rot-section-title">📅 Current Week</div>'+
      '<div style="font-size:13px;color:#d4eaf7;margin-bottom:12px;">Week of: <strong>'+weekStart+'</strong></div>'+
      '<div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px;">'+
        '<button class="btn btn-d" id="clearSelsOnlyBtn" style="font-size:12px;">🗑 Clear Selections Only</button>'+
        '<button class="btn btn-d" id="resetWeekBtn" style="font-size:12px;">🔄 Reset & Rotate Order</button>'+
      '</div>'+
    '</div>'+
    '<div style="background:rgba(13,31,53,.6);border:1px solid rgba(100,160,220,.1);border-radius:14px;padding:14px;margin-bottom:12px;">'+
      '<div class="rot-section-title">⚔️ Alliance Order & Groups</div>'+
      '<div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;">'+
        '<div>'+
          '<div style="font-size:11px;font-weight:800;color:#ffd60a;text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px;">🏰 Top 4 (SH+Fort)</div>'+
          top4Rows+
        '</div>'+
        '<div>'+
          '<div style="font-size:11px;font-weight:800;color:#7ec8e3;text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px;">🏯 Bot 5 (Fort only)</div>'+
          bot5Rows+
        '</div>'+
      '</div>'+
    '</div>'+
    '<div style="background:rgba(255,214,10,.04);border:1px solid rgba(255,214,10,.13);border-radius:14px;padding:14px;margin-bottom:12px;">'+
      '<div class="rot-section-title">🏳️ Alliance Representatives</div>'+
      '<div style="display:flex;gap:8px;margin-bottom:12px;">'+
        '<select class="sel" id="repPlayer" style="flex:1;"><option value="">— Select player —</option>'+
          ALL_PLAYERS.map(function(p){ return '<option value="'+p.name+'">'+p.name+'</option>'; }).join('')+
        '</select>'+
        '<select class="sel" id="repAlliance" style="flex:1;"><option value="">— Alliance —</option>'+
          ALL_ALLIANCES.map(function(a){ return '<option value="'+a+'">'+a+'</option>'; }).join('')+
        '</select>'+
        '<button class="btn btn-g btn-sm" id="addRepBtn" style="flex-shrink:0;">Add</button>'+
      '</div>'+
      repRows+
    '</div>'+
    '<div style="background:rgba(13,31,53,.6);border:1px solid rgba(100,160,220,.1);border-radius:14px;padding:14px;margin-bottom:12px;">'+
      '<div class="rot-section-title">🎁 Rewards (this week)</div>'+
      rewardRows+
      '<button class="btn btn-p" id="saveRewardsBtn" style="margin-top:8px;">💾 Save All Rewards</button>'+
    '</div>';

  // Reset week
  document.getElementById('resetWeekBtn').addEventListener('click',async function(){
    if(!confirm('Reset week? This will rotate the alliance order and clear all selections for the new week.')) return;
    var typed=prompt('Type RESET to confirm:');
    if(typed!=='RESET'){ toast('Cancelled'); return; }
    // Rotate top4 and bot5
    var newTop4=[ro.top4[1],ro.top4[2],ro.top4[3],ro.top4[0]];
    var newBot5=[ro.bot5[1],ro.bot5[2],ro.bot5[3],ro.bot5[4],ro.bot5[0]];
    var newWeek=getCurrentWeekStart();
    var r=await sb.from('rotation_state').update({top4_order:newTop4,bot5_order:newBot5,week_start:newWeek,current_turn:0,selections_done:false,updated_at:new Date().toISOString()}).eq('id',1).select().single();
    if(r.error){ toast('Error: '+r.error.message); return; }
    ROT_STATE=r.data;
    ROT_SELS=ROT_SELS.filter(function(s){ return s.week_start!==newWeek; });
    toast('✅ Week reset! New order: '+newTop4.join('→'));
    render();
  });

  // Clear selections only
  document.getElementById('clearSelsOnlyBtn').addEventListener('click',async function(){
    if(!confirm('Clear all selections for this week? The rotation order will NOT change.')) return;
    var typed=prompt('Type CLEAR to confirm:');
    if(typed!=='CLEAR'){ toast('Cancelled'); return; }
    var ws=ROT_STATE.week_start;
    var r=await sb.from('rotation_selections').delete().eq('week_start',ws);
    if(r.error){ toast('Error: '+r.error.message); return; }
    ROT_SELS=ROT_SELS.filter(function(s){ return s.week_start!==ws; });
    toast('✅ Selections cleared — order unchanged');
    render();
  });

  // Alliance order management
  async function saveAllianceOrder(newTop4, newBot5){
    var r=await sb.from('rotation_state').update({top4_order:newTop4,bot5_order:newBot5,updated_at:new Date().toISOString()}).eq('id',1).select().single();
    if(r.error){ toast('Error: '+r.error.message); return false; }
    ROT_STATE=r.data;
    // Update ALLIANCE_COLORS for renamed alliances
    return true;
  }

  rc.querySelectorAll('.rename-al').forEach(function(btn){
    btn.addEventListener('click',async function(){
      var al=btn.dataset.al; var grp=btn.dataset.group;
      var newName=prompt('Rename "'+al+'" to:', al);
      if(!newName||!newName.trim()||newName.trim()===al) return;
      newName=newName.trim().toUpperCase();
      var newTop4=ro.top4.map(function(x){ return x===al?newName:x; });
      var newBot5=ro.bot5.map(function(x){ return x===al?newName:x; });
      // Update ALLIANCE_COLORS
      if(ALLIANCE_COLORS[al]){ ALLIANCE_COLORS[newName]=ALLIANCE_COLORS[al]; delete ALLIANCE_COLORS[al]; }
      // Update reps
      var repUpdates=ALLIANCE_REPS.filter(function(r){ return r.alliance===al; });
      for(var ri=0;ri<repUpdates.length;ri++){
        await sb.from('alliance_reps').update({alliance:newName}).eq('player_name',repUpdates[ri].player_name);
        repUpdates[ri].alliance=newName;
      }
      // Update selections
      var selUpdates=ROT_SELS.filter(function(s){ return s.alliance===al; });
      for(var si=0;si<selUpdates.length;si++){
        await sb.from('rotation_selections').update({alliance:newName}).eq('id',selUpdates[si].id);
        selUpdates[si].alliance=newName;
      }
      var ok=await saveAllianceOrder(newTop4,newBot5);
      if(ok){ toast('✅ Renamed: '+al+' → '+newName); render(); }
    });
  });

  rc.querySelectorAll('.move-up-al').forEach(function(btn){
    btn.addEventListener('click',async function(){
      var al=btn.dataset.al; var grp=btn.dataset.group; var idx=parseInt(btn.dataset.idx);
      var arr=grp==='top4'?ro.top4.slice():ro.bot5.slice();
      var tmp=arr[idx-1]; arr[idx-1]=arr[idx]; arr[idx]=tmp;
      var newTop4=grp==='top4'?arr:ro.top4;
      var newBot5=grp==='bot5'?arr:ro.bot5;
      var ok=await saveAllianceOrder(newTop4,newBot5);
      if(ok){ toast('Order updated'); render(); }
    });
  });

  rc.querySelectorAll('.move-dn-al').forEach(function(btn){
    btn.addEventListener('click',async function(){
      var al=btn.dataset.al; var grp=btn.dataset.group; var idx=parseInt(btn.dataset.idx);
      var arr=grp==='top4'?ro.top4.slice():ro.bot5.slice();
      var tmp=arr[idx+1]; arr[idx+1]=arr[idx]; arr[idx]=tmp;
      var newTop4=grp==='top4'?arr:ro.top4;
      var newBot5=grp==='bot5'?arr:ro.bot5;
      var ok=await saveAllianceOrder(newTop4,newBot5);
      if(ok){ toast('Order updated'); render(); }
    });
  });

  rc.querySelectorAll('.move-grp-al').forEach(function(btn){
    btn.addEventListener('click',async function(){
      var al=btn.dataset.al; var grp=btn.dataset.group;
      var isTop=grp==='top4';
      if(isTop&&ro.top4.length<=1){ toast('Top 4 must have at least 1 alliance'); return; }
      if(!isTop&&ro.bot5.length<=1){ toast('Bot 5 must have at least 1 alliance'); return; }
      var newTop4=ro.top4.slice(); var newBot5=ro.bot5.slice();
      if(isTop){ newTop4=newTop4.filter(function(x){ return x!==al; }); newBot5.push(al); }
      else { newBot5=newBot5.filter(function(x){ return x!==al; }); newTop4.push(al); }
      if(newTop4.length>4){ toast('Top 4 can have max 4 alliances'); return; }
      var ok=await saveAllianceOrder(newTop4,newBot5);
      if(ok){ toast('✅ '+al+' moved to '+(isTop?'Bot 5':'Top 4')); render(); }
    });
  });

  // Add rep
  document.getElementById('addRepBtn').addEventListener('click',async function(){
    var pl=document.getElementById('repPlayer').value;
    var al=document.getElementById('repAlliance').value;
    if(!pl||!al){ toast('Select player and alliance'); return; }
    var r=await sb.from('alliance_reps').upsert({player_name:pl,alliance:al,granted_by:SESSION.name},{onConflict:'player_name'}).select().single();
    if(r.error){ toast('Error: '+r.error.message); return; }
    var idx=ALLIANCE_REPS.findIndex(function(x){ return x.player_name===pl; });
    if(idx>=0) ALLIANCE_REPS[idx]=r.data; else ALLIANCE_REPS.push(r.data);
    toast('✅ Rep added: '+pl+' → '+al);
    render();
  });

  // Revoke rep
  rc.querySelectorAll('.revoke-rep').forEach(function(btn){
    btn.addEventListener('click',async function(){
      var pl=btn.dataset.player;
      if(!confirm('Remove rep: '+pl+'?')) return;
      var r=await sb.from('alliance_reps').delete().eq('player_name',pl);
      if(r.error){ toast('Error'); return; }
      ALLIANCE_REPS=ALLIANCE_REPS.filter(function(x){ return x.player_name!==pl; });
      toast('Removed'); render();
    });
  });

  // Save rewards
  document.getElementById('saveRewardsBtn').addEventListener('click',async function(){
    var inputs=rc.querySelectorAll('.reward-inp');
    var updates=[];
    inputs.forEach(function(inp){
      updates.push(sb.from('location_rewards').update({reward_text:inp.value,updated_by:SESSION.name,updated_at:new Date().toISOString()}).eq('location_type',inp.dataset.type).eq('location_num',inp.dataset.num));
    });
    await Promise.all(updates);
    // Reload rewards
    var r=await sb.from('location_rewards').select('*');
    if(!r.error) ROT_REWARDS=r.data;
    toast('✅ Rewards saved!');
    render();
  });
}

async function init(){ render(); if(SESSION){ await loadAll(); subscribeRealtime(); render(); } }
init();

// Undo timer refresh
setInterval(function(){ if(UNDO_LIST.length>0&&SESSION&&!MODAL) { var tc=document.getElementById('tabContent'); if(tc&&TAB==='board') { var undoZone=tc.querySelector('.undo-bar'); if(undoZone){ var parent=undoZone.parentNode; var newBars=document.createElement('div'); newBars.innerHTML=renderUndoBars(); parent.querySelectorAll('.undo-bar').forEach(function(b){ b.remove(); }); Array.from(newBars.children).forEach(function(c){ parent.insertBefore(c,parent.querySelector('.filter-bar')); }); tc.querySelectorAll('.undo-btn').forEach(function(btn){ btn.addEventListener('click',function(){ var u=UNDO_LIST.find(function(x){ return x.id===btn.dataset.undoId; }); if(u) doUndo(u); }); }); } } } },10000);
</script>
</body>
</html>
