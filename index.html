function isSvspAdmin(name){ return isSuperAdmin(name)||getRole(name)==='prep_admin'; }

function calcScore(sub, buffType){
  var score=0;
  // Construction
  if(buffType==='construction'){
    score += (sub.refined_fire_crystals||0)*30000;
    score += (sub.fire_crystals||0)*2000;
    var cMins=((sub.construction_speedup_days||0)*1440)+((sub.construction_speedup_hours||0)*60);
    var gPlanned=((sub.general_speedup_planned_days||0)*1440)+((sub.general_speedup_planned_hours||0)*60);
    score += (cMins+gPlanned)*30;
  }
  // Training - no score, just listing
  if(buffType==='training'){
    var tMins=((sub.training_speedup_days||0)*1440)+((sub.training_speedup_hours||0)*60);
    var gPT=((sub.general_speedup_planned_days||0)*1440)+((sub.general_speedup_planned_hours||0)*60);
    score=tMins+gPT; // total minutes for sorting
  }
  // Research
  if(buffType==='research'){
    score += (sub.fire_crystal_shards||0)*1000;
    var rMins=((sub.research_speedup_days||0)*1440)+((sub.research_speedup_hours||0)*60);
    var gPR=((sub.general_speedup_planned_days||0)*1440)+((sub.general_speedup_planned_hours||0)*60);
    score += (rMins+gPR)*30;
  }
  // Valeria bonus
  var valLvl=sub.valeria_level||0;
  if(valLvl>0) score=Math.round(score*(1+valLvl*0.02));
  return score;
}

function assignSlots(subs, dayId){
  // Sort by score desc
  var sorted=subs.slice().sort(function(a,b){ return (b.calculated_score||0)-(a.calculated_score||0); });
  var slots=[];
  for(var h=0;h<24;h++){
    slots.push(String(h).padStart(2,'0')+':00');
    slots.push(String(h).padStart(2,'0')+':30');
  }
  var taken={};
  var result=[];
  sorted.forEach(function(sub){
    var preferred=[];
    if(sub.preferred_time_type==='specific'&&sub.preferred_time_exact){
      preferred=[sub.preferred_time_exact];
    } else if(sub.preferred_time_start&&sub.preferred_time_end){
      var inRange=slots.filter(function(s){ return s>=sub.preferred_time_start&&s<=sub.preferred_time_end; });
      preferred=inRange.length?inRange:slots;
    } else {
      preferred=slots;
    }
    // Find first available slot in preference
    var assigned=null;
    for(var i=0;i<preferred.length;i++){
      if(!taken[preferred[i]]){ assigned=preferred[i]; break; }
    }
    // If not found in preference, find nearest available
    if(!assigned){
      var prefMid=preferred[Math.floor(preferred.length/2)]||'12:00';
      var prefIdx=slots.indexOf(prefMid);
      for(var d=1;d<slots.length;d++){
        var lo=prefIdx-d, hi=prefIdx+d;
        if(lo>=0&&!taken[slots[lo]]){ assigned=slots[lo]; break; }
        if(hi<slots.length&&!taken[slots[hi]]){ assigned=slots[hi]; break; }
      }
    }
    if(assigned){ taken[assigned]=true; result.push({id:sub.id,slot:assigned}); }
  });
  return result;
}

}

    generalFields+
    valeriaField+

      '<div style="text-align:center;padding:12px;font-size:12px;color:#ff9500;">⚠️ Submissions are locked</div>':

        '<button class="btn btn-p" id="svspSubmit">💾 Update Submission</button>':

    btn.addEventListener('click',async function(){

      if(r.error){ toast('Error: '+r.error.message); return; }

  // Time type toggle
  sc.querySelectorAll('.pref-type').forEach(function(btn){
    btn.addEventListener('click',function(){
      var type=btn.dataset.type;
      document.getElementById('rangeFields').style.display=type==='range'?'':'none';
      document.getElementById('specificField').style.display=type==='specific'?'':'none';
      sc.querySelectorAll('.pref-type').forEach(function(b){ b.classList.toggle('on',b.dataset.type===type); });

  // Set select values
  if(s.preferred_time_start&&document.getElementById('tStart')) document.getElementById('tStart').value=s.preferred_time_start;
  if(s.preferred_time_end&&document.getElementById('tEnd')) document.getElementById('tEnd').value=s.preferred_time_end;
  if(s.preferred_time_exact&&document.getElementById('tExact')) document.getElementById('tExact').value=s.preferred_time_exact;

  // Submit
  var submitBtn=document.getElementById('svspSubmit');
  if(submitBtn){
    submitBtn.addEventListener('click',async function(){
      var pref=sc.querySelector('.pref-type.on')?sc.querySelector('.pref-type.on').dataset.type:'range';
      var sub={
        session_id:SVSP_SESSION.id, day_id:day.id,
        player_name:SESSION.name,
        player_id:ALL_PLAYERS.find(function(p){ return p.name===SESSION.name; })&&ALL_PLAYERS.find(function(p){ return p.name===SESSION.name; }).player_id||'',
        valeria_level:valeria,
        preferred_time_type:pref,
        preferred_time_start:pref==='range'&&document.getElementById('tStart')?document.getElementById('tStart').value:'',
        preferred_time_end:pref==='range'&&document.getElementById('tEnd')?document.getElementById('tEnd').value:'',

      }
      if(bt==='research'){

        sub.research_speedup_hours=parseInt(document.getElementById('rsh').value)||0;
      }
      sub.general_speedup_days=parseInt(document.getElementById('gsd').value)||0;
      sub.general_speedup_hours=parseInt(document.getElementById('gsh').value)||0;
      sub.general_speedup_planned_days=parseInt(document.getElementById('gpd').value)||0;
      sub.general_speedup_planned_hours=parseInt(document.getElementById('gph').value)||0;

      // Get day for buff type
      sub.calculated_score=calcScore(sub,bt);

      var r=await sb.from('svsprep_submissions').upsert(sub,{onConflict:'session_id,day_id,player_name'}).select().single();
      if(r.error){ toast('Error: '+r.error.message); return; }
      var idx=SVSP_SUBS.findIndex(function(x){ return x.day_id===day.id&&x.player_name===SESSION.name; });
      if(idx>=0) SVSP_SUBS[idx]=r.data; else SVSP_SUBS.push(r.data);
      toast('✅ Submitted!');
      SVSP_ACTIVE_DAY=null; render();
    });
  }
}

function renderSvspResults(sc){
  var days=SVSP_DAYS.filter(function(d){ return d.session_id===SVSP_SESSION.id; });
  var isSuper=isSuperAdmin(SESSION.name);

  // Manual entry form
  var playerOpts=groupedPlayerOpts(ALL_PLAYERS);
  // Search filter for manual entry
  var dayOpts=days.map(function(d){ return '<option value="'+d.id+'">Day '+d.day_num+' — '+d.buff_name+'</option>'; }).join('');
  var slotOpts='';
  for(var h=0;h<24;h++){
    slotOpts+='<option value="'+String(h).padStart(2,'0')+':00">'+String(h).padStart(2,'0')+':00</option>';
    slotOpts+='<option value="'+String(h).padStart(2,'0')+':30">'+String(h).padStart(2,'0')+':30</option>';
  }

  var manualForm=
    '<div style="background:rgba(255,214,10,.04);border:1px solid rgba(255,214,10,.15);border-radius:12px;padding:12px;margin-bottom:14px;">'+
      '<div style="font-size:11px;font-weight:800;color:#ffd60a;text-transform:uppercase;letter-spacing:.5px;margin-bottom:10px;">➕ Add / Edit Entry</div>'+
      '<div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:8px;">'+
        '<div>'+
          '<label style="font-size:10px;color:var(--t2);">Player ID</label>'+
          '<input class="inp" id="mPlayerId" placeholder="Player ID" style="margin-top:3px;">'+
        '</div>'+
        '<div>'+
          '<label style="font-size:10px;color:var(--t2);">Search & Select Player</label>'+
          '<input class="inp" id="mPlayerSearch" placeholder="🔍 Name or ID..." style="margin-top:3px;margin-bottom:3px;">'+
          '<select class="sel" id="mPlayerSel">'+playerOpts+'</select>'+
          '<input class="inp" id="mPlayerName" placeholder="Or type name manually" style="margin-top:4px;">'+
        '</div>'+
        '<div>'+
          '<label style="font-size:10px;color:var(--t2);">Day</label>'+
          '<select class="sel" id="mDay" style="margin-top:3px;">'+dayOpts+'</select>'+
        '</div>'+
        '<div>'+
          '<label style="font-size:10px;color:var(--t2);">Assign Slot</label>'+
          '<select class="sel" id="mSlot" style="margin-top:3px;">'+slotOpts+'</select>'+
        '</div>'+
      '</div>'+
      '<button class="btn btn-g" id="mAddEntry">Add Entry</button>'+
    '</div>';

  var html=manualForm;
  days.forEach(function(day){
    var daySubs=SVSP_SUBS.filter(function(s){ return s.day_id===day.id; });
    var sorted=daySubs.slice().sort(function(a,b){ return (b.calculated_score||0)-(a.calculated_score||0); });
    // Assign slots
    var assignments=assignSlots(sorted,day.id);
    var slotMap={};
    assignments.forEach(function(a){ slotMap[a.id]=a.slot; });
    // Sort by assigned slot
    var bySlot=daySubs.filter(function(s){ return slotMap[s.id]; }).sort(function(a,b){
      return (slotMap[a.id]||'99:99').localeCompare(slotMap[b.id]||'99:99');
    });

    html+='<div style="font-family:Cinzel,serif;font-size:13px;color:#ffd60a;margin-bottom:8px;margin-top:16px;">'+
      (day.buff_type==='construction'?'🏗️':day.buff_type==='training'?'⚔️':'🔬')+' Day '+day.day_num+' — '+day.buff_name+
      ' <span style="font-size:11px;color:var(--t2);">('+bySlot.length+'/48 slots)</span>'+
    '</div>';

    if(!bySlot.length){
      html+='<div style="font-size:12px;color:#2a4a65;padding:8px;">No submissions yet</div>';
      return;
    }

    html+=bySlot.map(function(sub,i){
      var slot=sub.assigned_slot||slotMap[sub.id]||'—';
      var isDone=sub.is_done;
      var isEven=i%2===0;
      var bg=isEven?'rgba(13,31,53,.8)':'rgba(7,15,28,.8)';
      var border=isEven?'rgba(100,160,220,.1)':'rgba(100,160,220,.06)';
      var opacity=isDone?'opacity:.45;':'';
      return '<div style="background:'+bg+';border:1px solid '+border+';border-radius:10px;padding:10px 12px;margin-bottom:6px;'+opacity+'">'+
        '<div style="display:flex;align-items:center;gap:10px;flex-wrap:wrap;">'+
          '<span style="font-size:15px;font-weight:800;color:#ffd60a;width:48px;flex-shrink:0;">'+slot+'</span>'+
          '<div style="flex:1;min-width:0;">'+
            '<div style="font-size:10px;color:var(--t2);font-family:monospace;margin-bottom:2px;">'+(sub.player_id||'No ID')+'</div>'+
            '<div style="font-size:13px;font-weight:700;color:'+(isDone?'var(--t2)':'#d4eaf7')+';">'+sub.player_name+'</div>'+
            (isSuper?'<div style="font-size:10px;color:#2a4a65;">Score: '+((sub.calculated_score||0)).toLocaleString()+'</div>':'')+
          '</div>'+
          '<div style="display:flex;gap:5px;align-items:center;">'+
            '<button class="svsp-copy-btn" data-id="'+(sub.player_id||'')+'">📋 ID</button>'+
            '<button class="svsp-done-btn '+(isDone?'done':'')+'" data-subid="'+sub.id+'" data-done="'+(isDone?'1':'0')+'">'+
              (isDone?'✅ Done':'⬜')+
            '</button>'+
            (isSuper?
              '<button class="svsp-copy-btn move-up-slot" data-subid="'+sub.id+'" data-slot="'+slot+'" data-dayid="'+day.id+'" style="color:#ff9500;">▲</button>'+
              '<button class="svsp-copy-btn move-dn-slot" data-subid="'+sub.id+'" data-slot="'+slot+'" data-dayid="'+day.id+'" style="color:#ff9500;">▼</button>':'')+
          '</div>'+
        '</div>'+
      '</div>';
    }).join('');
  });

  sc.innerHTML=
    (isSuper?'<button class="btn btn-p" id="finalizeBtn" style="margin-bottom:14px;">🎯 Finalize & Save Slots</button>':'')+
    html;

  // Finalize
  var finBtn=document.getElementById('finalizeBtn');
  if(finBtn){
    finBtn.addEventListener('click',async function(){
      if(!confirm('Finalize all slot assignments? This will save slots to the database.')) return;
      var days2=SVSP_DAYS.filter(function(d){ return d.session_id===SVSP_SESSION.id; });
      for(var di=0;di<days2.length;di++){
        var day=days2[di];
        var daySubs=SVSP_SUBS.filter(function(s){ return s.day_id===day.id; });
        var sorted=daySubs.slice().sort(function(a,b){ return (b.calculated_score||0)-(a.calculated_score||0); });
        var assignments=assignSlots(sorted,day.id);
        for(var ai=0;ai<assignments.length;ai++){
          var a=assignments[ai];
          await sb.from('svsprep_submissions').update({assigned_slot:a.slot,assigned_at:new Date().toISOString(),assigned_by:SESSION.name}).eq('id',a.id);
          var idx=SVSP_SUBS.findIndex(function(x){ return x.id===a.id; });
          if(idx>=0) SVSP_SUBS[idx].assigned_slot=a.slot;
        }
      }
      toast('✅ Slots finalized!'); render();
    });
  }

  // Manual entry
  var mSearch=document.getElementById('mPlayerSearch');
  if(mSearch) mSearch.addEventListener('input',function(){
    var q=mSearch.value.trim().toLowerCase();
    var sel=document.getElementById('mPlayerSel');
    Array.from(sel.options).forEach(function(opt){
      if(!opt.value){ opt.style.display=''; return; }
      var player=ALL_PLAYERS.find(function(p){ return p.name===opt.value; });
      var match=opt.value.toLowerCase().includes(q)||(player&&player.player_id&&player.player_id.toLowerCase().includes(q));
      opt.style.display=match||!q?'':'none';
    });
  });

  var mSel=document.getElementById('mPlayerSel');
  var mId=document.getElementById('mPlayerId');
  var mName=document.getElementById('mPlayerName');
  if(mSel) mSel.addEventListener('change',function(){
    var pname=mSel.value;
    if(!pname) return;
    var player=ALL_PLAYERS.find(function(p){ return p.name===pname; });
    if(player&&player.player_id) mId.value=player.player_id;
    mName.value='';
  });

  var mAddBtn=document.getElementById('mAddEntry');
  if(mAddBtn) mAddBtn.addEventListener('click',async function(){
    var dayId=document.getElementById('mDay').value;
    var slot=document.getElementById('mSlot').value;
    var pid=mId?mId.value.trim():'';
    var pname=(mSel&&mSel.value)?mSel.value:(mName&&mName.value.trim()?mName.value.trim():'');
    if(!pname||!dayId||!slot){ toast('Fill in player and day'); return; }
    // If player selected from list and ID entered, update their profile
    if(mSel&&mSel.value&&pid){
      var existing=ALL_PLAYERS.find(function(p){ return p.name===mSel.value; });
      if(existing&&!existing.player_id){
        await sb.from('players').update({player_id:pid}).eq('name',mSel.value);
        existing.player_id=pid;
      }
    }
    var day=days.find(function(d){ return d.id===dayId; });
    var sub={
      session_id:SVSP_SESSION.id,
      day_id:dayId,
      player_name:pname,
      player_id:pid,
      assigned_slot:slot,
      assigned_at:new Date().toISOString(),
      assigned_by:SESSION.name,
      calculated_score:0
    };
    var r=await sb.from('svsprep_submissions').upsert(sub,{onConflict:'session_id,day_id,player_name'}).select().single();
    if(r.error){ toast('Error: '+r.error.message); return; }

    });

  // Move up/down - manual slot adjustment
  sc.querySelectorAll('.move-up-slot,.move-dn-slot').forEach(function(btn){
    btn.addEventListener('click',async function(){
      var isUp=btn.classList.contains('move-up-slot');
      var curSlot=btn.dataset.slot;

      for(var h=0;h<24;h++){slots.push(String(h).padStart(2,'0')+':00');slots.push(String(h).padStart(2,'0')+':30');}
      var idx=slots.indexOf(curSlot);
      var newSlot=isUp?(idx>0?slots[idx-1]:curSlot):(idx<slots.length-1?slots[idx+1]:curSlot);

      var r=await sb.from('svsprep_submissions').update({assigned_slot:newSlot,assigned_by:SESSION.name}).eq('id',btn.dataset.subid).select().single();

      toast('Slot updated: '+newSlot); render();
    });
  });
}

function isCastleCoord(name){
  if(isSuperAdmin(name)) return true;
  if(!CASTLE_WAR) return false;
  return CASTLE_COORDS.some(function(c){ return c.player_name===name&&c.war_id===CASTLE_WAR.id; });
}
function isCastleRallier(name){
  if(!CASTLE_WAR) return false;
  return CASTLE_RALLIERS.some(function(r){ return r.rallier_name===name&&r.war_id===CASTLE_WAR.id; });
}

function fmtTimer(totalSecs){
  if(totalSecs<=0) return '0:00';
  var m=Math.floor(totalSecs/60);
  var s=totalSecs%60;
  return m+':'+(s<10?'0':'')+s;
}

// Active rally timers (client-side)
var _cwTimers={};

function getRallyState(rally){
  if(rally.status==='cancelled') return {phase:'cancelled',secs:0};
  if(rally.status==='commanded') return {phase:'commanded',secs:0};
  // opened - calculate time elapsed
  var openedAt=new Date(rally.opened_at).getTime();
  var now=Date.now();
  var elapsed=Math.floor((now-openedAt)/1000);
  var rallyDur=300; // 5 minutes
  var marchDur=rally.march_seconds||35;
  var total=rallyDur+marchDur;
  var remaining=total-elapsed;
  if(remaining<=0) return {phase:'arrived',secs:0};
  if(remaining<=marchDur) return {phase:'marching',secs:remaining};
  return {phase:'rallying',secs:remaining-marchDur,totalSecs:remaining};
}

function renderCastleWarRallierView(app){
  app.innerHTML=
    buildModuleHeader('castlewar','🏰','Castle War',(CASTLE_WAR&&CASTLE_WAR.status==='active'?'🔴 LIVE — '+CASTLE_WAR.name:'No active war'))+

    MODULE=null; render();
  });

  var cw=document.getElementById('cwRallierContent');

  function renderRallierContent(){
    if(!CASTLE_WAR||CASTLE_WAR.status==='setup'){
      cw.innerHTML='<div class="empty"><div class="empty-icon">⚙️</div><p>No active war.<br>Stand by.</p></div>';

    }
    var war=CASTLE_WAR;
    var warRallies=CASTLE_RALLIES.filter(function(r){ return r.war_id===war.id; });
    var activeRallies=warRallies.filter(function(r){ return r.status==='commanded'||r.status==='opened'; });

    if(!activeRallies.length){
      cw.innerHTML='<div class="empty"><div class="empty-icon">⏳</div><p>No active rallies.<br>Stand by for commands.</p></div>';
      return;
    }

    function alColor(al){ return ALLIANCE_COLORS&&ALLIANCE_COLORS[al]?ALLIANCE_COLORS[al]:'var(--ac)'; }

    cw.innerHTML='<div style="padding:12px;">'+
      '<div style="font-size:11px;color:var(--t2);text-transform:uppercase;letter-spacing:.5px;margin-bottom:10px;">Active Rallies</div>'+
      activeRallies.map(function(rally){
        var state=getRallyState(rally);
        var col=alColor(rally.alliance);
        var timerHtml='';
        if(rally.status==='opened'){
          if(state.phase==='rallying')
            timerHtml='<div class="cw-timer cw-timer-rallying" data-timer="'+rally.id+'">'+fmtTimer(state.secs)+'</div>'+
              '<div style="text-align:center;font-size:12px;color:#ff9500;font-weight:700;">⚔️ RALLYING — join now!</div>';
          else if(state.phase==='marching')
            timerHtml='<div class="cw-timer cw-timer-marching" data-timer="'+rally.id+'">'+fmtTimer(state.secs)+'</div>'+
              '<div style="text-align:center;font-size:13px;color:#ff453a;font-weight:800;">🏃 MARCH NOW!</div>';
          else
            timerHtml='<div class="cw-timer cw-timer-arrived">⚠️ ARRIVED!</div>';
        } else {
          timerHtml='<div style="text-align:center;font-size:13px;color:#ff9500;padding:12px;font-weight:700;">⏳ Waiting for coordinator to open rally...</div>';
        }
        return '<div style="background:rgba('+hexToRgb(col)+',.06);border:1px solid rgba('+hexToRgb(col)+',.2);border-radius:14px;padding:14px;margin-bottom:10px;">'+
          '<div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px;">'+
            '<div>'+
              '<div style="font-size:14px;font-weight:800;color:'+col+';">'+rally.alliance+'</div>'+
              '<div style="font-size:12px;color:#8ab4cc;">Coord: '+rally.coordinator_name+'</div>'+
              '<div style="font-size:11px;color:var(--ac);font-weight:700;">March: '+rally.march_seconds+'s</div>'+
            '</div>'+
            '<div style="font-size:11px;color:#8ab4cc;font-weight:700;">'+
              new Date(rally.commanded_at).toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit',second:'2-digit',timeZone:'UTC'})+' UTC'+
            '</div>'+
          '</div>'+
          timerHtml+
        '</div>';
      }).join('')+
    '</div>';

    // Start timers for opened rallies
    activeRallies.filter(function(r){ return r.status==='opened'; }).forEach(function(rally){
      if(_cwTimers[rally.id]) return;
      _cwTimers[rally.id]=setInterval(function(){
        if(MODULE!=='castlewar'){ clearInterval(_cwTimers[rally.id]); delete _cwTimers[rally.id]; return; }
        var el=document.querySelector('.cw-timer[data-timer="'+rally.id+'"]');
        if(!el){ clearInterval(_cwTimers[rally.id]); delete _cwTimers[rally.id]; return; }
        var s=getRallyState(rally);
        if(s.phase==='rallying'){
          el.textContent=fmtTimer(s.secs); el.className='cw-timer cw-timer-rallying';
        } else if(s.phase==='marching'){
          el.textContent=fmtTimer(s.secs); el.className='cw-timer cw-timer-marching';
          if(navigator.vibrate&&s.secs===rally.march_seconds) navigator.vibrate([300,100,300]);
        } else {
          el.textContent='⚠️ ARRIVED!'; el.className='cw-timer cw-timer-arrived';
          clearInterval(_cwTimers[rally.id]); delete _cwTimers[rally.id];
        }
      },1000);
    });
  }

  renderRallierContent();

  // Realtime subscription
  if(window._cwSub){ try{ sb.removeChannel(window._cwSub); }catch(e){} }
  window._cwSub=sb.channel('castle-war-rallier')
    .on('postgres_changes',{event:'*',schema:'public',table:'castle_rallies'},function(p){
      if(p.eventType==='INSERT') CASTLE_RALLIES.push(p.new);
      else if(p.eventType==='UPDATE') CASTLE_RALLIES=CASTLE_RALLIES.map(function(r){ return r.id===p.new.id?p.new:r; });
      else if(p.eventType==='DELETE') CASTLE_RALLIES=CASTLE_RALLIES.filter(function(r){ return r.id!==p.old.id; });
      renderRallierContent();
    })
    .subscribe();
}

  // Start timers for opened rallies

    startRallyTimer(rally.id);
  });

function startRallyTimer(rallyId){
  if(_cwTimers[rallyId]) return; // already running
  _cwTimers[rallyId]=setInterval(function(){
    if(MODULE!=='castlewar'){ clearInterval(_cwTimers[rallyId]); delete _cwTimers[rallyId]; return; }
    // Update just the timer element
    var card=document.querySelector('[data-rallyid="'+rallyId+'"]');
    if(!card) return;
    var rally=CASTLE_RALLIES.find(function(r){ return r.id===rallyId; });
    if(!rally||rally.status!=='opened'){ clearInterval(_cwTimers[rallyId]); delete _cwTimers[rallyId]; return; }
    var state=getRallyState(rally);
    var timerEl=card.querySelector('.cw-timer');
    if(!timerEl) return;
    if(state.phase==='rallying'){
      timerEl.textContent=fmtTimer(state.secs);
      timerEl.className='cw-timer cw-timer-rallying';
      var subEl=timerEl.nextElementSibling;
      if(subEl) subEl.textContent='⚔️ RALLYING';
    } else if(state.phase==='marching'){
      timerEl.textContent=fmtTimer(state.secs);
      timerEl.className='cw-timer cw-timer-marching';
      var subEl2=timerEl.nextElementSibling;
      if(subEl2) subEl2.textContent='🏃 MARCHING!';
      if(navigator.vibrate&&state.secs===rally.march_seconds) navigator.vibrate([300,100,300]);
    } else {
      timerEl.textContent='⚠️ ARRIVED!';
      timerEl.className='cw-timer cw-timer-arrived';
      clearInterval(_cwTimers[rallyId]); delete _cwTimers[rallyId];
      if(navigator.vibrate) navigator.vibrate([500,200,500,200,500]);
    }
  }, 1000);
}

function hexToRgb(hex){
  if(!hex||hex[0]!=='#') return '126,200,227';
  var r=parseInt(hex.slice(1,3),16);
  var g=parseInt(hex.slice(3,5),16);
  var b=parseInt(hex.slice(5,7),16);
  return r+','+g+','+b;
}

function subscribeRealtime(){
  if(REALTIME) sb.removeChannel(REALTIME);
  REALTIME=sb.channel('rt-all')
    .on('postgres_changes',{event:'*',schema:'public',table:'castle_rallies'},function(){
      sb.from('castle_rallies').select('*').order('commanded_at',{ascending:false}).limit(100).then(function(r){
        if(!r.error&&r.data){ CASTLE_RALLIES=r.data; }
        if(MODULE==='castlewar') render();

    })
    .on('postgres_changes',{event:'*',schema:'public',table:'castle_wars'},function(){

      });

}

function simpleMarkdown(md){
  if(!md) return '';
  var lines = md.split('\n');
  var html = '';
  var inUl = false, inOl = false;
  for(var i=0;i<lines.length;i++){
    var l = lines[i];
    // Close lists if needed
    if(inUl && !/^\s*[-*]\s/.test(l)){ html+='</ul>'; inUl=false; }
    if(inOl && !/^\s*\d+\.\s/.test(l)){ html+='</ol>'; inOl=false; }

    if(/^###\s/.test(l)){       html+='<h3>'+inlineFormat(l.replace(/^###\s/,''))+'</h3>'; }
    else if(/^##\s/.test(l)){   html+='<h2>'+inlineFormat(l.replace(/^##\s/,''))+'</h2>'; }
    else if(/^#\s/.test(l)){    html+='<h1>'+inlineFormat(l.replace(/^#\s/,''))+'</h1>'; }
    else if(/^---+$/.test(l.trim())){ html+='<hr>'; }
    else if(/^>\s/.test(l)){    html+='<blockquote>'+inlineFormat(l.replace(/^>\s/,''))+'</blockquote>'; }
    else if(/^\s*[-*]\s/.test(l)){
      if(!inUl){ html+='<ul>'; inUl=true; }
      html+='<li>'+inlineFormat(l.replace(/^\s*[-*]\s/,''))+'</li>';
    }
    else if(/^\s*\d+\.\s/.test(l)){
      if(!inOl){ html+='<ol>'; inOl=true; }
      html+='<li>'+inlineFormat(l.replace(/^\s*\d+\.\s/,''))+'</li>';
    }
    else if(l.trim()===''){     html+='<p style="margin:4px 0;"></p>'; }
    else{                        html+='<p>'+inlineFormat(l)+'</p>'; }
  }
  if(inUl) html+='</ul>';
  if(inOl) html+='</ol>';
  return html;
}

function inlineFormat(t){
  t = t.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  t = t.replace(/`([^`]+)`/g,'<code>$1</code>');
  t = t.replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>');
  t = t.replace(/\*(.+?)\*/g,'<em>$1</em>');
  t = t.replace(/__(.+?)__/g,'<strong>$1</strong>');
  t = t.replace(/_(.+?)_/g,'<em>$1</em>');
  return t;
}

        '<input class="inp" id="rulesTitle" value="'+(e.title?escHtml(e.title):'')+'" placeholder="e.g. General Rules">'+
      '</div>'+
      '<div class="field">'+
        '<label class="lbl">Short Description (optional)</label>'+
        '<input class="inp" id="rulesDesc" value="'+(e.description?escHtml(e.description):'')+'" placeholder="One-line summary">'+
      '</div>'+
      '<div class="field">'+
        '<label class="lbl">Content (Markdown)</label>'+
        '<textarea class="inp" id="rulesContent" rows="10" style="resize:vertical;font-family:monospace;font-size:12px;line-height:1.6;" placeholder="# Title&#10;&#10;## Section&#10;&#10;- Rule 1&#10;- Rule 2&#10;&#10;**Bold** and *italic* supported.">'+(e.content?e.content.replace(/</g,'&lt;'):'')+'</textarea>'+
      '</div>'+
      '<div style="display:flex;gap:8px;">'+
        '<button class="btn btn-p" id="rulesSaveBtn" style="flex:1;">'+( isNew?'Add Topic':'Save Changes')+'</button>'+
        '<button class="btn btn-g btn-sm" id="rulesCancelBtn" style="width:auto;padding:13px 18px;">Cancel</button>'+
      '</div>'+
      (RULES_EDIT&&RULES_EDIT.id?'<div style="margin-top:10px;">'+
        '<div style="height:1px;background:var(--b);margin-bottom:10px;"></div>'+
        '<div style="font-size:10px;font-weight:800;color:var(--t3);text-transform:uppercase;letter-spacing:1px;margin-bottom:8px;">Markdown Preview</div>'+
        '<div class="rules-md" id="rulesMdPreview" style="font-size:12px;">'+simpleMarkdown(RULES_EDIT.content||'')+'</div>'+
      '</div>':'')+
    '</div>';
  })();

  el.innerHTML =
    '<div class="rules-admin-wrap">'+
      '<button class="btn btn-p" id="rulesNewBtn" style="margin-bottom:14px;">+ New Topic</button>'+
      (RULES_EDIT!==undefined ? formHtml : '')+
      listHtml+
    '</div>';

  // New button
  var newBtn = document.getElementById('rulesNewBtn');
  if(newBtn) newBtn.addEventListener('click',function(){
    RULES_EDIT = {}; renderRulesContent();
  });

  // Cancel
  var cancelBtn = document.getElementById('rulesCancelBtn');
  if(cancelBtn) cancelBtn.addEventListener('click',function(){ RULES_EDIT=undefined; renderRulesContent(); });

  // Live preview on content change
  var contentTa = document.getElementById('rulesContent');
  var previewEl = document.getElementById('rulesMdPreview');
  if(contentTa && previewEl){
    contentTa.addEventListener('input',function(){ previewEl.innerHTML=simpleMarkdown(contentTa.value); });
  }

  // Save
  var saveBtn = document.getElementById('rulesSaveBtn');
  if(saveBtn) saveBtn.addEventListener('click',async function(){
    var emoji = (document.getElementById('rulesEmoji').value.trim()||'📌');
    var title = document.getElementById('rulesTitle').value.trim();
    var desc  = document.getElementById('rulesDesc').value.trim();
    var content = document.getElementById('rulesContent').value;
    if(!title){ toast('⚠️ Title required'); return; }
    saveBtn.disabled=true; saveBtn.textContent='Saving...';
    if(RULES_EDIT&&RULES_EDIT.id){
      var r=await sb.from('rules_topics').update({emoji,title,description:desc,content}).eq('id',RULES_EDIT.id).select().single();
      if(r.error){ toast('Error: '+r.error.message); saveBtn.disabled=false; saveBtn.textContent='Save Changes'; return; }
      RULES_TOPICS=RULES_TOPICS.map(function(x){ return x.id===r.data.id?r.data:x; });
    } else {
      var maxOrder = RULES_TOPICS.length ? Math.max.apply(null,RULES_TOPICS.map(function(x){ return x.order_index||0; }))+1 : 0;
      var r=await sb.from('rules_topics').insert({emoji,title,description:desc,content,order_index:maxOrder}).select().single();
      if(r.error){ toast('Error: '+r.error.message); saveBtn.disabled=false; saveBtn.textContent='Add Topic'; return; }
      RULES_TOPICS.push(r.data);
    }
    RULES_EDIT=undefined; toast('✅ Saved!'); renderRulesContent();
  });

  // Edit buttons
  el.querySelectorAll('[data-edit]').forEach(function(btn){
    btn.addEventListener('click',function(){
      RULES_EDIT=RULES_TOPICS.find(function(x){ return x.id===btn.dataset.edit; });
      renderRulesContent();
    });
  });

  // Delete buttons
  el.querySelectorAll('[data-del]').forEach(function(btn){
    btn.addEventListener('click',async function(){
      if(!confirm('Delete this topic?')) return;
      var tid=btn.dataset.del;
      var r=await sb.from('rules_topics').delete().eq('id',tid);
      if(r.error){ toast('Error: '+r.error.message); return; }
      RULES_TOPICS=RULES_TOPICS.filter(function(x){ return x.id!==tid; });
      toast('🗑 Deleted'); renderRulesContent();
    });
  });

  // Move up/down
  el.querySelectorAll('[data-move-up]').forEach(function(btn){
    btn.addEventListener('click',async function(){
      var idx=RULES_TOPICS.findIndex(function(x){ return x.id===btn.dataset.moveUp; });
      if(idx<=0) return;
      var a=RULES_TOPICS[idx],b=RULES_TOPICS[idx-1];
      var tmpO=a.order_index; a.order_index=b.order_index; b.order_index=tmpO;
      var r1=await sb.from('rules_topics').update({order_index:a.order_index}).eq('id',a.id);
      var r2=await sb.from('rules_topics').update({order_index:b.order_index}).eq('id',b.id);
      if(r1.error||r2.error){ toast('Error: '+(r1.error||r2.error).message); }
      RULES_TOPICS.sort(function(x,y){ return x.order_index-y.order_index; });
      renderRulesContent();
    });
  });
  el.querySelectorAll('[data-move-dn]').forEach(function(btn){
    btn.addEventListener('click',async function(){
      var idx=RULES_TOPICS.findIndex(function(x){ return x.id===btn.dataset.moveDn; });
      if(idx<0||idx>=RULES_TOPICS.length-1) return;
      var a=RULES_TOPICS[idx],b=RULES_TOPICS[idx+1];
      var tmpO=a.order_index; a.order_index=b.order_index; b.order_index=tmpO;
      var r1=await sb.from('rules_topics').update({order_index:a.order_index}).eq('id',a.id);
      var r2=await sb.from('rules_topics').update({order_index:b.order_index}).eq('id',b.id);
      if(r1.error||r2.error){ toast('Error: '+(r1.error||r2.error).message); }
      RULES_TOPICS.sort(function(x,y){ return x.order_index-y.order_index; });
      renderRulesContent();
    });
  });
}

function renderCrazyJoeApp(app){
  var isSuper = isSuperAdmin(SESSION.name);
  var isCjAdm = isCjAdmin(SESSION.name);
  var myPlayer = ALL_PLAYERS.find(function(p){ return p.name===SESSION.name; });
  var myAlliance = isSuper ? null : (myPlayer&&myPlayer.alliance ? myPlayer.alliance : null);

  // Gate: non-super must have alliance
  if(!isSuper && !myAlliance){
    app.innerHTML=
      buildModuleHeader('crazyjoe','🤪','Crazy Joe','Team Assignments')+
      '<div class="empty"><div class="empty-icon">⚠️</div><p>Please set your Alliance in your profile before accessing this module.</p></div>';
    document.getElementById('backHome').addEventListener('click',function(){ MODULE=null; render(); });
    return;
  }

  // Super admin: alliance picker (view all or filter)
  var viewAlliance = isSuper ? (CJ_VIEW_ALLIANCE||'__all__') : myAlliance;

  var tabs = [{id:'board',icon:'👥',label:'Teams'}];
  if(isCjAdm) tabs.push({id:'admin',icon:'⚙️',label:'Admin'});

  var navHtml = tabs.map(function(t){
    return '<button class="nav-btn '+(CJ_TAB===t.id?'on':'')+'" data-tab="'+t.id+'">'+
      '<span class="ic">'+t.icon+'</span>'+t.label+'</button>';
  }).join('');

  app.innerHTML=
    buildModuleHeader('crazyjoe','🤪','Crazy Joe','Team Assignments')+
    '<div class="content" id="cjContent"></div>'+
    '<div class="footer">© 2026 State 2901 · All rights reserved · Designed by Otto</div>'+
    '<div class="nav">'+navHtml+'</div>';

  document.getElementById('backHome').addEventListener('click',function(){ MODULE=null; render(); });
  app.querySelectorAll('.nav-btn').forEach(function(btn){
    btn.addEventListener('click',function(){ CJ_TAB=btn.dataset.tab; renderCjContent(); });
  });

  var cjEl = document.getElementById('cjContent');

  function renderCjContent(){
    if(CJ_TAB==='board') renderCjBoard(cjEl, viewAlliance, isSuper, isCjAdm, myAlliance);
    if(CJ_TAB==='admin' && isCjAdm) renderCjAdmin(cjEl, isSuper, myAlliance);
  }
  renderCjContent();
}

function getCjAllianceFilter(isSuper, viewAlliance, myAlliance){
  if(isSuper && viewAlliance && viewAlliance!=='__all__') return viewAlliance;
  if(isSuper && (!viewAlliance||viewAlliance==='__all__')) return null; // all
  return myAlliance;
}

function renderCjBoard(el, viewAlliance, isSuper, isCjAdm, myAlliance){
  // Alliance selector for super admin
  var allianceFilter = getCjAllianceFilter(isSuper, viewAlliance, myAlliance);

  var alliances = [];
  if(isSuper){
    alliances = [...new Set(CJ_TEAMS.map(function(t){ return t.alliance; }))].sort();
  }

  var superAlliancePicker = '';
  if(isSuper){
    var alOpts = '<option value="__all__"'+(CJ_VIEW_ALLIANCE===null||CJ_VIEW_ALLIANCE==='__all__'?' selected':'')+'>All Alliances</option>'+
      alliances.map(function(al){
        return '<option value="'+al+'"'+(CJ_VIEW_ALLIANCE===al?' selected':'')+'>'+al+'</option>';
      }).join('');
    superAlliancePicker =
      '<div style="margin-bottom:14px;display:flex;align-items:center;gap:10px;">'+
        '<label style="font-size:11px;font-weight:700;color:rgba(200,225,245,.45);text-transform:uppercase;letter-spacing:.8px;flex-shrink:0;">View Alliance</label>'+
        '<select class="sel" id="cjAllianceSel" style="flex:1;">'+alOpts+'</select>'+
      '</div>';
  }

  // Filter teams
  var teams = allianceFilter
    ? CJ_TEAMS.filter(function(t){ return t.alliance===allianceFilter; })
    : CJ_TEAMS;

  if(!teams.length && !isSuper){
    el.innerHTML = superAlliancePicker +
      '<div class="empty"><div class="empty-icon">👥</div><p>No teams set up yet.<br>Your alliance admin will configure the teams.</p></div>';
    return;
  }
  if(!teams.length && isSuper){
    el.innerHTML = superAlliancePicker +
      '<div class="empty"><div class="empty-icon">👥</div><p>No teams found'+(allianceFilter?' for '+allianceFilter:'')+'.</p></div>';
    var alSel=el.querySelector('#cjAllianceSel');
    if(alSel) alSel.addEventListener('change',function(){ CJ_VIEW_ALLIANCE=this.value==='__all__'?null:this.value; render(); });
    return;
  }

  // Group by alliance if showing all
  var grouped = {};
  teams.forEach(function(t){
    if(!grouped[t.alliance]) grouped[t.alliance]=[];
    grouped[t.alliance].push(t);
  });

  var alKeys = Object.keys(grouped).sort();

  var html = superAlliancePicker;

  alKeys.forEach(function(al){
    var alTeams = grouped[al];
    if(alKeys.length>1){
      html += '<div style="font-size:11px;font-weight:800;text-transform:uppercase;letter-spacing:1px;color:rgba(200,225,245,.4);margin-bottom:8px;margin-top:4px;">'+al+'</div>';
    }

    // Copy all teams button (admin only)
    if(isCjAdm && (isSuper || al===myAlliance)){
      html += '<button class="btn btn-g btn-sm" id="cjCopyAll_'+al+'" style="margin-bottom:10px;width:100%;">📋 Copy All Teams</button>';
    }

    alTeams.forEach(function(team){
      var members = CJ_MEMBERS.filter(function(m){ return m.team_id===team.id; })
        .sort(function(a,b){ return a.position-b.position; });
      var memberCount = members.length;
      var countColor = memberCount>=6?'var(--green)':memberCount===0?'var(--t3)':'var(--orange)';

      html +=
        '<div class="card" style="margin-bottom:12px;">'+
          '<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;">'+
            '<div style="font-size:14px;font-weight:800;color:var(--t);">'+escHtml(team.team_name)+'</div>'+
            '<div style="display:flex;align-items:center;gap:8px;">'+
              '<span style="font-size:12px;font-weight:700;color:'+countColor+';">'+memberCount+'/6</span>'+
              (isCjAdm&&(isSuper||al===myAlliance)?
                '<button class="btn btn-g btn-sm" id="cjCopyTeam_'+team.id+'">📋 Copy</button>':'')+
            '</div>'+
          '</div>'+
          (memberCount===0
            ? '<div style="font-size:12px;color:var(--t3);text-align:center;padding:10px 0;">No members yet</div>'
            : '<div style="display:flex;flex-direction:column;gap:4px;">'+
                members.map(function(m,i){
                  return '<div style="display:flex;align-items:center;gap:10px;padding:6px 8px;background:rgba(255,255,255,.03);border-radius:8px;border:1px solid rgba(255,255,255,.06);">'+
                    '<span style="font-size:11px;font-weight:800;color:var(--t3);width:16px;text-align:right;">'+(i+1)+'.</span>'+
                    '<span style="font-size:13px;font-weight:600;">'+escHtml(m.player_name)+'</span>'+
                  '</div>';
                }).join('')+
              '</div>')+
        '</div>';
    });
  });

  el.innerHTML=html;

  // Alliance picker change
  var alSel=el.querySelector('#cjAllianceSel');
  if(alSel) alSel.addEventListener('change',function(){ CJ_VIEW_ALLIANCE=this.value==='__all__'?null:this.value; render(); });

  // Copy single team
  el.querySelectorAll('[id^="cjCopyTeam_"]').forEach(function(btn){
    btn.addEventListener('click',function(){
      var tid=btn.id.replace('cjCopyTeam_','');
      var team=CJ_TEAMS.find(function(t){ return t.id===tid; });
      if(!team) return;
      var members=CJ_MEMBERS.filter(function(m){ return m.team_id===tid; }).sort(function(a,b){ return a.position-b.position; });
      var text='👥 '+team.team_name+' ('+members.length+'/6)\n'+'─'.repeat(20)+'\n'+
        members.map(function(m,i){ return (i+1)+'. '+m.player_name; }).join('\n');
      navigator.clipboard.writeText(text).then(function(){ toast('✅ Team copied!'); });
    });
  });

  // Copy all teams per alliance
  alKeys.forEach(function(al){
    var btn=el.querySelector('#cjCopyAll_'+al);
    if(!btn) return;
    btn.addEventListener('click',function(){
      var alTeams=grouped[al];
      var lines=['🤪 CRAZY JOE — '+al,'━'.repeat(24),''];
      alTeams.forEach(function(team){
        var members=CJ_MEMBERS.filter(function(m){ return m.team_id===team.id; }).sort(function(a,b){ return a.position-b.position; });
        lines.push('👥 '+team.team_name+' ('+members.length+'/6)');
        members.forEach(function(m,i){ lines.push('  '+(i+1)+'. '+m.player_name); });
        lines.push('');
      });
      navigator.clipboard.writeText(lines.join('\n')).then(function(){ toast('✅ All teams copied!'); });
    });
  });
}

function renderCjAdmin(el, isSuper, myAlliance){
  // Admin sees only their alliance teams (super sees all)
  var myTeams = isSuper ? CJ_TEAMS : CJ_TEAMS.filter(function(t){ return t.alliance===myAlliance; });

  // My alliance players from DB (for picker)
  var alliancePlayers = isSuper ? ALL_PLAYERS : ALL_PLAYERS.filter(function(p){
    return p.alliance && p.alliance.toLowerCase()===(myAlliance||'').toLowerCase();
  });

  var teamListHtml = myTeams.length===0
    ? '<div class="empty" style="padding:20px 0;"><div class="empty-icon">👥</div><p>No teams yet. Create your first team below.</p></div>'
    : myTeams.map(function(team){
        var members = CJ_MEMBERS.filter(function(m){ return m.team_id===team.id; }).sort(function(a,b){ return a.position-b.position; });
        return '<div class="card" style="margin-bottom:10px;">'+
          '<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:6px;">'+
            '<div>'+
              '<div style="font-size:13px;font-weight:800;">'+escHtml(team.team_name)+'</div>'+
              (isSuper?'<div style="font-size:10px;color:var(--t3);">'+team.alliance+'</div>':'')+
            '</div>'+
            '<div style="display:flex;gap:6px;">'+
              '<button class="btn btn-g btn-sm cjEditTeamBtn" data-id="'+team.id+'" style="font-size:11px;">✏️ Edit</button>'+
              '<button class="btn btn-d btn-sm cjDelTeamBtn" data-id="'+team.id+'" style="font-size:11px;">🗑</button>'+
            '</div>'+
          '</div>'+
          '<div style="font-size:11px;color:var(--t3);">'+members.length+'/6 members — '+
            (members.length?members.map(function(m){ return m.player_name; }).join(', '):'Empty')+
          '</div>'+
        '</div>';
      }).join('');

  // Alliance selector for super admin when creating
  var superAlSelect = isSuper
    ? '<div class="field"><label class="lbl">Alliance</label>'+
        '<input class="inp" id="cjFormAlliance" placeholder="Alliance name (e.g. BST)" value="'+(CJ_VIEW_ALLIANCE&&CJ_VIEW_ALLIANCE!=='__all__'?CJ_VIEW_ALLIANCE:'')+'" autocomplete="off">'+
      '</div>'
    : '';

  // Member builder
  var memberRows = '';
  for(var i=1;i<=6;i++){
    // DB player options for this alliance
    var pOpts = '<option value="">— Select from roster —</option>'+
      alliancePlayers.map(function(p){ return '<option value="'+escHtml(p.name)+'">'+escHtml(p.name)+(p.alliance?' ['+p.alliance+']':'')+'</option>'; }).join('');
    memberRows +=
      '<div style="display:flex;align-items:center;gap:6px;margin-bottom:6px;" id="cjMemberRow_'+i+'">'+
        '<span style="font-size:11px;font-weight:800;color:var(--t3);width:14px;flex-shrink:0;">'+i+'.</span>'+
        '<select class="sel" id="cjMemberSel_'+i+'" style="flex:1;font-size:12px;">'+pOpts+'</select>'+
        '<input class="inp" id="cjMemberMan_'+i+'" placeholder="or type name" style="flex:1;font-size:12px;" autocomplete="off">'+
      '</div>';
  }

  el.innerHTML=
    '<div style="font-size:11px;font-weight:800;text-transform:uppercase;letter-spacing:.8px;color:rgba(200,225,245,.4);margin-bottom:10px;">Current Teams</div>'+
    teamListHtml+
    '<div style="height:1px;background:rgba(255,255,255,.07);margin:16px 0;"></div>'+
    '<div style="font-size:11px;font-weight:800;text-transform:uppercase;letter-spacing:.8px;color:rgba(200,225,245,.4);margin-bottom:10px;" id="cjFormTitle">➕ Add New Team</div>'+
    '<div id="cjFormCard" class="card" style="margin-bottom:12px;">'+
      superAlSelect+
      '<div class="field"><label class="lbl">Team Name</label>'+
        '<input class="inp" id="cjTeamName" placeholder="e.g. Team Alpha" autocomplete="off">'+
      '</div>'+
      '<div class="field">'+
        '<label class="lbl">Members <span style="font-size:10px;color:var(--t3);font-weight:500;">(select from roster or type manually)</span></label>'+
        memberRows+
      '</div>'+
      '<div style="display:flex;gap:8px;">'+
        '<button class="btn btn-p" id="cjSaveTeam" style="flex:1;">Save Team</button>'+
        '<button class="btn btn-g" id="cjCancelEdit" style="display:none;flex:1;">Cancel</button>'+
      '</div>'+
      '<div class="err" id="cjFormErr"></div>'+
    '</div>';

  // Bind edit/delete
  el.querySelectorAll('.cjEditTeamBtn').forEach(function(btn){
    btn.addEventListener('click',function(){
      var tid=btn.dataset.id;
      var team=CJ_TEAMS.find(function(t){ return t.id===tid; });
      if(!team) return;
      CJ_EDIT_TEAM=team;
      document.getElementById('cjFormTitle').textContent='✏️ Edit Team';
      document.getElementById('cjTeamName').value=team.team_name;
      if(isSuper&&document.getElementById('cjFormAlliance')) document.getElementById('cjFormAlliance').value=team.alliance||'';
      document.getElementById('cjCancelEdit').style.display='';
      // Fill members
      var members=CJ_MEMBERS.filter(function(m){ return m.team_id===tid; }).sort(function(a,b){ return a.position-b.position; });
      for(var i=1;i<=6;i++){
        var m=members[i-1];
        var selEl=document.getElementById('cjMemberSel_'+i);
        var manEl=document.getElementById('cjMemberMan_'+i);
        if(!m){ if(selEl) selEl.value=''; if(manEl) manEl.value=''; continue; }
        // Check if name matches a roster option
        var matchOpt=selEl?Array.from(selEl.options).find(function(o){ return o.value===m.player_name; }):null;
        if(matchOpt){ selEl.value=m.player_name; if(manEl) manEl.value=''; }
        else { if(selEl) selEl.value=''; if(manEl) manEl.value=m.player_name; }
      }
      document.getElementById('cjFormCard').scrollIntoView({behavior:'smooth',block:'start'});
    });
  });

  el.querySelectorAll('.cjDelTeamBtn').forEach(function(btn){
    btn.addEventListener('click',async function(){
      var tid=btn.dataset.id;
      var team=CJ_TEAMS.find(function(t){ return t.id===tid; });
      if(!team) return;
      if(!confirm('Delete team "'+team.team_name+'"? This cannot be undone.')) return;
      btn.disabled=true;
      await sb.from('cj_team_members').delete().eq('team_id',tid);
      await sb.from('cj_teams').delete().eq('id',tid);
      CJ_TEAMS=CJ_TEAMS.filter(function(t){ return t.id!==tid; });
      CJ_MEMBERS=CJ_MEMBERS.filter(function(m){ return m.team_id!==tid; });
      toast('✅ Team deleted.');
      renderCjAdmin(el, isSuper, myAlliance);
    });
  });

  document.getElementById('cjCancelEdit').addEventListener('click',function(){
    CJ_EDIT_TEAM=null;
    document.getElementById('cjFormTitle').textContent='➕ Add New Team';
    document.getElementById('cjTeamName').value='';
    for(var i=1;i<=6;i++){
      var s=document.getElementById('cjMemberSel_'+i); if(s) s.value='';
      var m=document.getElementById('cjMemberMan_'+i); if(m) m.value='';
    }
    if(isSuper&&document.getElementById('cjFormAlliance')) document.getElementById('cjFormAlliance').value='';
    document.getElementById('cjCancelEdit').style.display='none';
    document.getElementById('cjFormTitle').textContent='➕ Add New Team';
  });

  // When a roster select changes, clear the manual input and vice versa
  for(var i=1;i<=6;i++){
    (function(idx){
      var selEl=document.getElementById('cjMemberSel_'+idx);
      var manEl=document.getElementById('cjMemberMan_'+idx);
      if(selEl) selEl.addEventListener('change',function(){ if(this.value&&manEl) manEl.value=''; });
      if(manEl) manEl.addEventListener('input',function(){ if(this.value.trim()&&selEl) selEl.value=''; });
    })(i);
  }

  document.getElementById('cjSaveTeam').addEventListener('click',async function(){
    var saveBtn=this;
    var teamName=document.getElementById('cjTeamName').value.trim();
    var alliance=isSuper?(document.getElementById('cjFormAlliance')?document.getElementById('cjFormAlliance').value.trim().toUpperCase():''):myAlliance;
    var errEl=document.getElementById('cjFormErr');
    errEl.textContent='';

    if(!teamName){ errEl.textContent='Team name is required.'; return; }
    if(!alliance){ errEl.textContent='Alliance is required.'; return; }

    // Collect members (priority: manual input > select)
    var members=[];
    for(var i=1;i<=6;i++){
      var manEl=document.getElementById('cjMemberMan_'+i);
      var selEl=document.getElementById('cjMemberSel_'+i);
      var name=(manEl&&manEl.value.trim())||(selEl&&selEl.value)||'';
      if(name) members.push({name:name,pos:members.length+1});
    }

    saveBtn.disabled=true; saveBtn.textContent='Saving...';

    try{
      var teamId;
      if(CJ_EDIT_TEAM){
        // Update team
        var upd=await sb.from('cj_teams').update({team_name:teamName,alliance:alliance}).eq('id',CJ_EDIT_TEAM.id).select().single();
        if(upd.error) throw upd.error;
        teamId=CJ_EDIT_TEAM.id;
        CJ_TEAMS=CJ_TEAMS.map(function(t){ return t.id===teamId?upd.data:t; });
        // Delete old members
        await sb.from('cj_team_members').delete().eq('team_id',teamId);
        CJ_MEMBERS=CJ_MEMBERS.filter(function(m){ return m.team_id!==teamId; });
      } else {
        // Insert team
        var ins=await sb.from('cj_teams').insert({team_name:teamName,alliance:alliance}).select().single();
        if(ins.error) throw ins.error;
        teamId=ins.data.id;
        CJ_TEAMS.push(ins.data);
      }

      // Insert members
      if(members.length){
        var mRows=members.map(function(m){ return {team_id:teamId,player_name:m.name,position:m.pos}; });
        var mIns=await sb.from('cj_team_members').insert(mRows).select();
        if(mIns.error) throw mIns.error;
        CJ_MEMBERS=CJ_MEMBERS.concat(mIns.data);
      }

      CJ_EDIT_TEAM=null;
      toast('✅ Team saved!');
      renderCjAdmin(el, isSuper, myAlliance);
    } catch(e){
      errEl.textContent='Error: '+(e.message||'Unknown error');
    } finally {
      saveBtn.disabled=false; saveBtn.textContent='Save Team';
    }
  });
}

function escHtml(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

// ── PWA: SERVICE WORKER + PUSH ─────────────────────────────
const VAPID_PUBLIC = 'BJuz8Z1iiGP-hz1G5gUw2Uibj7H4rwEkCyCd40yLWa7-tfRab77t1W3fh3eEr77VeF1PgLkyj77QnnNu0BflEyY';

function urlB64ToUint8(b){
  var pad='='.repeat((4-b.length%4)%4);
  var raw=atob((b+pad).replace(/-/g,'+').replace(/_/g,'/'));
  return new Uint8Array([].map.call(raw,function(c){ return c.charCodeAt(0); }));
}

function isIOS(){ return /iPhone|iPad|iPod/.test(navigator.userAgent)&&!window.MSStream; }
function isStandalone(){ return window.matchMedia('(display-mode: standalone)').matches||window.navigator.standalone; }

// Register service worker
if('serviceWorker' in navigator){
  navigator.serviceWorker.register('/State-2901/sw.js',{scope:'/State-2901/'})
    .then(function(reg){ window._swReg=reg; })
    .catch(function(e){ console.warn('SW failed:',e); });
}

async function subscribePush(){
  if(!window._swReg||!SESSION) return false;
  try{
    var existing=await window._swReg.pushManager.getSubscription();
    if(existing){ await savePushSub(existing); return true; }
    var sub=await window._swReg.pushManager.subscribe({
      userVisibleOnly:true,
      applicationServerKey:urlB64ToUint8(VAPID_PUBLIC)
    });
    await savePushSub(sub);
    return true;
  }catch(e){ console.warn('Push sub failed:',e); return false; }
}

async function savePushSub(sub){
  if(!SESSION) return;
  var r=await sb.from('push_subscriptions').upsert({
    player_name: SESSION.name,
    endpoint:    sub.endpoint,
    subscription: sub.toJSON()
  },{onConflict:'endpoint'});
  if(r.error) console.warn('Push subscription save failed:',r.error.message);
}

async function requestPushPermission(){
  if(!('Notification' in window)) return 'unsupported';
  if(Notification.permission==='granted'){ await subscribePush(); return 'granted'; }
  if(Notification.permission==='denied') return 'denied';
  var perm=await Notification.requestPermission();
  if(perm==='granted') await subscribePush();
  return perm;
}
