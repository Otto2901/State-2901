function startRallyTimer(rallyId){
  if(_cwTimers[rallyId]) return; // already running
  _cwTimers[rallyId]=setInterval(function(){
    if(MODULE!=='castlewar'){ clearInterval(_cwTimers[rallyId]); delete _cwTimers[rallyId]; return; }
    // Update just the timer element
    var card=document.querySelector('[data-rallyid="'+rallyId+'"]');
    if(!card) return;
    var rally=CASTLE_RALLIES.find(function(r){ return r.id===rallyId; });
    if(!rally||rally.status!=='opened'){ clearInterval(_cwTimers[rallyId]); delete _cwTimers[rallyId]; return; }
    var state=getRallyState(rally);
    var timerEl=card.querySelector('.cw-timer');
    if(!timerEl) return;
    if(state.phase==='rallying'){
      timerEl.textContent=fmtTimer(state.secs);
      timerEl.className='cw-timer cw-timer-rallying';
      var subEl=timerEl.nextElementSibling;
      if(subEl) subEl.textContent='⚔️ RALLYING';
    } else if(state.phase==='marching'){
      timerEl.textContent=fmtTimer(state.secs);
      timerEl.className='cw-timer cw-timer-marching';
      var subEl2=timerEl.nextElementSibling;
      if(subEl2) subEl2.textContent='🏃 MARCHING!';
      if(navigator.vibrate&&state.secs===rally.march_seconds) navigator.vibrate([300,100,300]);
    } else {
      timerEl.textContent='⚠️ ARRIVED!';
      timerEl.className='cw-timer cw-timer-arrived';
      clearInterval(_cwTimers[rallyId]); delete _cwTimers[rallyId];
      if(navigator.vibrate) navigator.vibrate([500,200,500,200,500]);
    }
  }, 1000);
}

function hexToRgb(hex){
  if(!hex||hex[0]!=='#') return '126,200,227';
  var r=parseInt(hex.slice(1,3),16);
  var g=parseInt(hex.slice(3,5),16);
  var b=parseInt(hex.slice(5,7),16);
  return r+','+g+','+b;
}

function renderCastleSetup(cw){
  var war=CASTLE_WAR;
  var warCoords=war?CASTLE_COORDS.filter(function(c){ return c.war_id===war.id; }):[];

  // Group by alliance
  var groups={};
  warCoords.forEach(function(c){
    if(!groups[c.alliance]) groups[c.alliance]=[];
    groups[c.alliance].push(c);
  });

  cw.innerHTML=
    '<div style="background:rgba(13,31,53,.6);border:1px solid rgba(100,160,220,.1);border-radius:14px;padding:14px;margin-bottom:12px;">'+
      '<div style="font-size:12px;font-weight:800;color:#7ec8e3;margin-bottom:12px;text-transform:uppercase;letter-spacing:.5px;">⚙️ War Setup</div>'+
      '<div style="margin-bottom:10px;">'+
        '<label style="font-size:11px;color:#4a7a9b;">War Name</label>'+
        '<input class="inp" id="cwName" value="'+(war?war.name:'Castle War')+'" style="margin-top:4px;">'+
      '</div>'+
      '<div style="margin-bottom:10px;">'+
        '<label style="font-size:11px;color:#4a7a9b;">Participating Alliances (castle holders — comma separated)</label>'+
        '<input class="inp" id="cwAlliances" value="'+((war&&war.participant_alliances)||['BST','FAL','SEA','HUM']).join(',')+'" style="margin-top:4px;" placeholder="BST,FAL,SEA,HUM">'+
      '</div>'+
      '<div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px;">'+
        '<button class="btn btn-g" id="cwSave">💾 Save</button>'+
        '<button class="btn '+(war&&war.status==='active'?'btn-d':'btn-p')+'" id="cwToggle">'+
          (war&&war.status==='active'?'⏹ End War':'▶️ Start War')+
        '</button>'+
      '</div>'+
      (!war?'<button class="btn btn-p" id="cwCreate">➕ Create War</button>':'')+
    '</div>'+
    (war?
      '<div style="background:rgba(13,31,53,.6);border:1px solid rgba(100,160,220,.1);border-radius:14px;padding:14px;margin-bottom:12px;">'+
        '<div style="font-size:12px;font-weight:800;color:#7ec8e3;margin-bottom:12px;text-transform:uppercase;letter-spacing:.5px;">👥 Coordinators</div>'+
        '<div style="font-size:11px;color:#4a7a9b;margin-bottom:8px;">Assign coordinators per alliance. Each coordinator sets their own march time after joining.</div>'+
        '<div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:8px;align-items:end;">'+
          '<select class="sel" id="cwCoordPlayer">'+groupedPlayerOpts(ALL_PLAYERS)+'</select>'+
          '<select class="sel" id="cwCoordAlliance">'+
            ['BST','FAL','SEA','HUM'].map(function(a){ return '<option value="'+a+'">'+a+'</option>'; }).join('')+
          '</select>'+
        '</div>'+
        '<button class="btn btn-g" id="cwAddCoord" style="margin-bottom:12px;">➕ Add Coordinator</button>'+
        Object.keys(groups).map(function(al){
          return '<div style="margin-bottom:10px;">'+
            '<div style="font-size:11px;font-weight:800;color:'+(ALLIANCE_COLORS[al]||'#7ec8e3')+';margin-bottom:6px;">'+al+'</div>'+
            groups[al].map(function(c){
              return '<div style="display:flex;justify-content:space-between;align-items:center;padding:7px 10px;background:rgba(7,20,38,.5);border-radius:8px;margin-bottom:4px;">'+
                '<div>'+
                  '<div style="font-size:13px;font-weight:700;color:#d4eaf7;">'+c.player_name+'</div>'+
                  '<div style="font-size:11px;color:#4a7a9b;">March: '+c.march_seconds+'s</div>'+
                '</div>'+
                '<div style="display:flex;gap:6px;">'+
                  '<input class="inp" type="number" value="'+c.march_seconds+'" style="width:60px;padding:4px 8px;" data-coordid="'+c.id+'" class="march-edit">'+
                  '<button class="btn btn-d btn-sm del-coord" data-id="'+c.id+'" style="padding:5px 10px;font-size:11px;">🗑</button>'+
                '</div>'+
              '</div>';
            }).join('')+
          '</div>';
        }).join('')+
      '</div>':'');

  // Create war
  var createBtn=document.getElementById('cwCreate');
  if(createBtn) createBtn.addEventListener('click',async function(){
    var r=await sb.from('castle_wars').insert([{name:'Castle War',status:'setup',created_by:SESSION.name}]).select().single();
    if(r.error){ toast('Error'); return; }
    CASTLE_WAR=r.data; toast('✅ War created'); render();
  });

  // Save
  var saveBtn=document.getElementById('cwSave');
  if(saveBtn) saveBtn.addEventListener('click',async function(){
    if(!war) return;
    var alStr=document.getElementById('cwAlliances').value;
    var alArr=alStr.split(',').map(function(a){ return a.trim().toUpperCase(); }).filter(Boolean);
    var r=await sb.from('castle_wars').update({name:document.getElementById('cwName').value,participant_alliances:alArr}).eq('id',war.id).select().single();
    if(r.error){ toast('Error'); return; }
    CASTLE_WAR=r.data; toast('✅ Saved'); render();
  });

  // Toggle active/end
  var toggleBtn=document.getElementById('cwToggle');
  if(toggleBtn) toggleBtn.addEventListener('click',async function(){
    if(!war) return;
    var newStatus=war.status==='active'?'ended':'active';
    if(newStatus==='ended'&&!confirm('End this war?')) return;
    var r=await sb.from('castle_wars').update({
      status:newStatus,
      started_at:newStatus==='active'?new Date().toISOString():war.started_at,
      ended_at:newStatus==='ended'?new Date().toISOString():null
    }).eq('id',war.id).select().single();
    if(r.error){ toast('Error'); return; }
    CASTLE_WAR=r.data; toast(newStatus==='active'?'🔴 War started!':'⏹ War ended'); render();
  });

  // Add coordinator
  var addCoordBtn=document.getElementById('cwAddCoord');
  if(addCoordBtn) addCoordBtn.addEventListener('click',async function(){
    var player=document.getElementById('cwCoordPlayer').value;
    var alliance=document.getElementById('cwCoordAlliance').value;
    if(!player){ toast('Select a player'); return; }
    var r=await sb.from('castle_coordinators').insert([{
      war_id:war.id,player_name:player,alliance:alliance,march_seconds:35,added_by:SESSION.name
    }]).select().single();
    if(r.error){ toast('Error: '+r.error.message); return; }
    CASTLE_COORDS.push(r.data); toast('✅ Coordinator added'); render();
  });

  // Delete coordinator
  cw.querySelectorAll('.del-coord').forEach(function(btn){
    btn.addEventListener('click',async function(){
      if(!confirm('Remove coordinator?')) return;
      await sb.from('castle_coordinators').delete().eq('id',btn.dataset.id);
      CASTLE_COORDS=CASTLE_COORDS.filter(function(c){ return c.id!==btn.dataset.id; });
      toast('Removed'); render();
    });
  });

  // Update march time
  cw.querySelectorAll('.march-edit').forEach(function(inp){
    inp.addEventListener('change',async function(){
      var march=parseInt(inp.value)||35;
      await sb.from('castle_coordinators').update({march_seconds:march}).eq('id',inp.dataset.coordid);
      var idx=CASTLE_COORDS.findIndex(function(c){ return c.id===inp.dataset.coordid; });
      if(idx>=0) CASTLE_COORDS[idx].march_seconds=march;
      toast('✅ March time updated');
    });
  });
}

function renderCastleHistory(cw){
  var isSuper=isSuperAdmin(SESSION.name);
  var allRallies=CASTLE_RALLIES.filter(function(r){ return r.status==='cancelled'||r.status==='opened'; });

  cw.innerHTML=
    '<div style="background:rgba(13,31,53,.6);border:1px solid rgba(100,160,220,.1);border-radius:14px;padding:14px;">'+
      '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;">'+
        '<div style="font-size:12px;font-weight:800;color:#7ec8e3;text-transform:uppercase;letter-spacing:.5px;">📋 Rally History ('+allRallies.length+')</div>'+
        (isSuper?'<button class="btn btn-d btn-sm" id="clearHistory" style="padding:5px 12px;font-size:11px;background:rgba(255,69,58,.12);border-color:rgba(255,69,58,.3);color:#ff453a;">🗑 Clear All</button>':'')+
      '</div>'+
      (allRallies.length?
        allRallies.map(function(r,i){
          var isEven=i%2===0;
          var bg=isEven?'rgba(13,31,53,.6)':'rgba(7,15,28,.6)';
          var statusIcon=r.status==='opened'?'✅':'❌';
          return '<div style="background:'+bg+';border-radius:8px;padding:8px 10px;margin-bottom:4px;display:flex;justify-content:space-between;align-items:center;">'+
            '<div>'+
              '<div style="font-size:12px;font-weight:700;color:#d4eaf7;">'+statusIcon+' '+r.alliance+' — '+r.coordinator_name+'</div>'+
              '<div style="font-size:10px;color:#4a7a9b;">By: '+r.commanded_by+' · '+new Date(r.commanded_at).toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit',second:'2-digit'})+'</div>'+
            '</div>'+
            (r.opened_at?'<div style="font-size:10px;color:#52c759;">March: '+r.march_seconds+'s</div>':'')+
          '</div>';
        }).join(''):
        '<div class="empty" style="padding:20px;"><div class="empty-icon">📋</div><p>No history yet</p></div>'
      )+
    '</div>';

  var clearBtn=document.getElementById('clearHistory');
  if(clearBtn) clearBtn.addEventListener('click',async function(){
    if(!CASTLE_WAR) return;
    if(!confirm('Clear all rally history for this war?')) return;
    var typed=prompt('Type CLEAR to confirm:');
    if(typed!=='CLEAR'){ toast('Cancelled'); return; }
    var warId=CASTLE_WAR.id;
    await sb.from('castle_rallies').delete().eq('war_id',warId);
    CASTLE_RALLIES=[];
    toast('🗑 History cleared'); render();
  });
}

async function init(){ render(); if(SESSION){ await loadAll(); subscribeRealtime(); render(); } }
init();

// Undo timer refresh
setInterval(function(){ if(UNDO_LIST.length>0&&SESSION&&!MODAL) { var tc=document.getElementById('tabContent'); if(tc&&TAB==='board') { var undoZone=tc.querySelector('.undo-bar'); if(undoZone){ var parent=undoZone.parentNode; var newBars=document.createElement('div'); newBars.innerHTML=renderUndoBars(); parent.querySelectorAll('.undo-bar').forEach(function(b){ b.remove(); }); Array.from(newBars.children).forEach(function(c){ parent.insertBefore(c,parent.querySelector('.filter-bar')); }); tc.querySelectorAll('.undo-btn').forEach(function(btn){ btn.addEventListener('click',function(){ var u=UNDO_LIST.find(function(x){ return x.id===btn.dataset.undoId; }); if(u) doUndo(u); }); }); } } } },10000);
</script>
