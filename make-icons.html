<!DOCTYPE html>
<html>
<head><title>Icon Generator</title></head>
<body>
<canvas id="c192" width="192" height="192"></canvas>
<canvas id="c512" width="512" height="512"></canvas>
<script>
function drawIcon(canvas) {
  const s = canvas.width;
  const ctx = canvas.getContext('2d');

  // Background
  const bg = ctx.createLinearGradient(0, 0, s, s);
  bg.addColorStop(0, '#050d18');
  bg.addColorStop(1, '#0d1f35');
  ctx.fillStyle = bg;
  ctx.roundRect(0, 0, s, s, s * 0.2);
  ctx.fill();

  // Glow
  const glow = ctx.createRadialGradient(s/2, s*0.4, 0, s/2, s*0.4, s*0.5);
  glow.addColorStop(0, 'rgba(99,179,237,0.25)');
  glow.addColorStop(1, 'rgba(99,179,237,0)');
  ctx.fillStyle = glow;
  ctx.fillRect(0, 0, s, s);

  // Castle emoji
  ctx.font = `${s * 0.5}px serif`;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText('🏰', s / 2, s / 2 - s * 0.03);

  // "2901" text
  ctx.font = `bold ${s * 0.13}px Inter, sans-serif`;
  ctx.fillStyle = '#63b3ed';
  ctx.fillText('2901', s / 2, s * 0.78);
}

['c192','c512'].forEach(id => drawIcon(document.getElementById(id)));

// Download buttons
['192','512'].forEach(size => {
  const btn = document.createElement('button');
  btn.textContent = 'Download icon-' + size + '.png';
  btn.onclick = () => {
    const a = document.createElement('a');
    a.download = 'icon-' + size + '.png';
    a.href = document.getElementById('c' + size).toDataURL('image/png');
    a.click();
  };
  document.body.appendChild(btn);
  document.body.appendChild(document.createElement('br'));
});
</script>
</body>
</html>
